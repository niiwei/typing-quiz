<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Quiz - 打字测验</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.home-page {
            background-color: var(--bg);
        }
        .home-hero {
            text-align: center;
            margin-bottom: 4rem;
            padding: 6rem 0 4rem;
        }
        .home-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 3rem 0;
            flex-wrap: wrap;
        }
        .stat-box {
            text-align: center;
            min-width: 140px;
            padding: 2rem 1.5rem;
            border: 1px solid var(--border);
            background: #fff;
        }
        .stat-num {
            font-size: 3.5rem;
            font-weight: 200;
            display: block;
            line-height: 1;
            color: var(--text-main);
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-top: 1rem;
            display: block;
        }
        .home-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }
    </style>
</head>
<body class="home-page">
    <nav class="navbar">
        <a href="home.html" class="logo">打字测验</a>
        <div class="nav-links">
            <a href="home.html" class="active">首页</a>
            <a href="quizzes.html">测验</a>
            <a href="create.html">创建</a>
            <a href="manage.html">管理</a>
            <a href="#" onclick="Auth.logout()" style="color: var(--error); margin-left: 2rem;">退出</a>
        </div>
    </nav>

    <div id="home-container" class="fade-in">
        <section class="home-hero">
            <h1 style="font-weight: 200; letter-spacing: 0.2em; font-size: 2rem; margin-bottom: 3rem; color: var(--text-main);">每日目标</h1>
            
            <div class="home-stats">
                <div class="stat-box">
                    <span class="stat-num" id="new-count">0</span>
                    <span class="stat-label">新测验</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="review-count" style="color: var(--warning);">0</span>
                    <span class="stat-label">待复习</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="learning-count">0</span>
                    <span class="stat-label">学习中</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="suspended-count">0</span>
                    <span class="stat-label">已暂停</span>
                </div>
            </div>
            
            <div style="margin-top: 4rem;">
                <button class="btn" id="start-review-btn" onclick="startDailyReview()">开始复习流</button>
            </div>
        </section>

        <section class="home-section">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem;">
                <h2 style="font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.1em; font-weight: 700;">最近活动</h2>
                <a href="quizzes.html" style="font-size: 0.65rem; color: var(--text-muted); text-decoration: none;">查看全部</a>
            </div>
            <div id="recent-activity-list">
                <div class="loading" style="text-align: center; padding: 3rem; font-size: 0.8rem; color: var(--text-muted);">数据加载中...</div>
            </div>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/review-api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            // 更新用户信息显示
            const userSection = document.getElementById('userSection');
            if (userSection) userSection.style.display = 'block';

            // 加载统计数据
            await loadHomeSummary();
            // 加载最近活动（模拟逻辑或从存储获取）
            await loadRecentActivity();
        });

        async function loadHomeSummary() {
            try {
                const summary = await ReviewAPI.getTodaySummary();
                document.getElementById('new-count').textContent = summary.pendingLearnCount || 0;
                document.getElementById('review-count').textContent = summary.pendingReviewCount || 0;
                document.getElementById('learning-count').textContent = summary.scheduledCount || 0;
                document.getElementById('suspended-count').textContent = summary.suspendedCount || 0;

                const startBtn = document.getElementById('start-review-btn');
                if ((summary.pendingLearnCount + summary.pendingReviewCount) === 0) {
                    startBtn.disabled = true;
                    startBtn.textContent = '今日已完成';
                    startBtn.style.opacity = '0.5';
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        async function loadRecentActivity() {
            // 这里可以根据实际 API 调整，目前先从 localStorage 的 quizHistory 中获取
            const container = document.getElementById('recent-activity-list');
            const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
            
            if (history.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; font-size: 0.8rem; color: var(--text-muted);">暂无活动记录</div>';
                return;
            }

            container.innerHTML = history.slice(0, 5).map(item => `
                <div class="list-item">
                    <div class="list-info">
                        <span class="title">${item.title}</span>
                        <span class="sub">${item.accuracy}% 准确率 • 用时 ${item.time}</span>
                    </div>
                    <span style="font-size: 0.7rem; color: var(--text-muted);">${formatTimeAgo(item.timestamp)}</span>
                </div>
            `).join('');
        }

        function formatTimeAgo(timestamp) {
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}小时前`;
            return new Date(timestamp).toLocaleDateString();
        }

        async function startDailyReview() {
            try {
                const items = await ReviewAPI.getDueItems();
                if (items.length === 0) {
                    alert('今日无待复习测验');
                    return;
                }
                const quizIds = items.map(item => item.quizId);
                sessionStorage.setItem('reviewQuizList', JSON.stringify(quizIds));
                window.location.href = `index.html?id=${quizIds[0]}&mode=review`;
            } catch (error) {
                alert('获取复习列表失败');
            }
        }
    </script>
</body>
</html>
