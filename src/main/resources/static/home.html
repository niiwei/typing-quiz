<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Quiz - 打字测验</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <style>
        body.home-page {
            background-color: var(--bg);
        }
        .home-hero {
            text-align: center;
            margin-bottom: 4rem;
            padding: 6rem 0 4rem;
        }
        .home-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 3rem 0;
            flex-wrap: wrap;
        }
        .stat-box {
            text-align: center;
            min-width: 140px;
            padding: 2rem 1.5rem;
            border: 1px solid var(--border);
            background: #fff;
        }
        .stat-num {
            font-size: 3.5rem;
            font-weight: 200;
            display: block;
            line-height: 1;
            color: var(--text-main);
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-top: 1rem;
            display: block;
        }
        .home-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        /* 分组复习卡片样式 */
        .review-group-card {
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            background: #fff;
            transition: all 0.2s ease;
        }
        .review-group-card:hover {
            border-color: var(--accent);
        }
        .review-group-card.expanded {
            border-color: var(--accent);
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .group-header:hover {
            background: var(--hover);
        }
        .group-title-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .group-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }
        .group-stats {
            display: flex;
            gap: 0.5rem;
        }
        .stat-tag {
            font-size: 0.6rem;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .stat-tag.new {
            background: #fef3c7;
            color: #92400e;
        }
        .stat-tag.learning {
            background: #fde68a;
            color: #92400e;
        }
        .stat-tag.review {
            background: #dbeafe;
            color: #1e40af;
        }
        .stat-tag.relearning {
            background: #fee2e2;
            color: #991b1b;
        }
        .group-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .expand-icon {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }
        .group-content {
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        /* 测验项样式 */
        .quiz-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .quiz-item:last-child {
            border-bottom: none;
        }
        .quiz-item:hover {
            background: #fff;
        }
        .quiz-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .quiz-title-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .quiz-title {
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 500;
        }
        .quiz-status {
            font-size: 0.55rem;
            padding: 0.1rem 0.35rem;
            border-radius: 2px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .quiz-status.status-new {
            background: #fcd34d;
            color: #78350f;
        }
        .quiz-status.status-learning {
            background: #fde68a;
            color: #92400e;
        }
        .quiz-status.status-review {
            background: #93c5fd;
            color: #1e3a8a;
        }
        .quiz-status.status-relearning {
            background: #fca5a5;
            color: #7f1d1d;
        }
        .quiz-status.status-scheduled {
            background: transparent;
            color: var(--text-muted);
        }
        .quiz-status.status-suspended {
            background: var(--border);
            color: var(--text-muted);
        }
        .quiz-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .quiz-actions {
            display: flex;
            gap: 0.5rem;
        }
        .quiz-actions .btn-small {
            padding: 0.4rem 0.75rem;
            font-size: 0.7rem;
        }
        .btn-secondary {
            border-color: var(--border);
            color: var(--text-muted);
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body class="home-page">
    <nav class="navbar">
        <a href="home.html" class="logo">打字测验</a>
        <div class="nav-links">
            <a href="home.html" class="active">首页</a>
            <a href="quizzes.html">测验</a>
            <a href="create.html">创建</a>
            <a href="manage.html">管理</a>
            <a href="#" onclick="Auth.logout()" style="color: var(--error); margin-left: 2rem;">退出</a>
        </div>
    </nav>

    <div id="home-container" class="fade-in">
        <section class="home-hero">
            <h1 style="font-weight: 200; letter-spacing: 0.2em; font-size: 2rem; margin-bottom: 3rem; color: var(--text-main);">每日目标</h1>
            
            <div class="home-stats">
                <div class="stat-box">
                    <span class="stat-num" id="new-count" style="color: var(--warning);">0</span>
                    <span class="stat-label">待学习</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="review-count" style="color: var(--warning);">0</span>
                    <span class="stat-label">待复习</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="learning-count" style="color: var(--text-muted);">0</span>
                    <span class="stat-label">未到期</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="suspended-count" style="color: var(--text-muted);">0</span>
                    <span class="stat-label">已暂停</span>
                </div>
            </div>
            
            <div style="margin-top: 4rem;">
                <button class="btn" id="start-review-btn" onclick="startDailyReview()">开始复习流</button>
            </div>
        </section>

        <section class="home-section" id="group-review-section">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem;">
                <div>
                    <h2 style="font-size: 0.9rem; color: var(--text-main); letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.25rem;">分组复习</h2>
                    <span style="font-size: 0.65rem; color: var(--text-muted);">点击分组展开查看测验</span>
                </div>
            </div>

            <!-- 筛选器 -->
            <div class="filter-bar" style="margin-bottom: 1.5rem;">
                <div class="filter-row">
                    <span class="filter-label">状态</span>
                    <div id="status-filters" style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                        <span class="filter-item active" data-status="all" onclick="filterByStatus('all', this)">全部</span>
                        <span class="filter-item" data-status="NEW" onclick="filterByStatus('NEW', this)">新测验</span>
                        <span class="filter-item" data-status="PENDING_LEARN" onclick="filterByStatus('PENDING_LEARN', this)">待学习</span>
                        <span class="filter-item" data-status="PENDING_RELEARN" onclick="filterByStatus('PENDING_RELEARN', this)">待重学</span>
                        <span class="filter-item" data-status="PENDING_REVIEW" onclick="filterByStatus('PENDING_REVIEW', this)">待复习</span>
                        <span class="filter-item" data-status="SCHEDULED" onclick="filterByStatus('SCHEDULED', this)">未到期</span>
                        <span class="filter-item" data-status="SUSPENDED" onclick="filterByStatus('SUSPENDED', this)">已暂停</span>
                    </div>
                </div>
                <div class="filter-row">
                    <span class="filter-label">分组</span>
                    <div id="group-filters" style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                        <span class="filter-item active" data-group="all" onclick="filterByGroup('all', this)">全部</span>
                        <!-- 动态填充 -->
                    </div>
                </div>
                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                    <button class="btn btn-small" onclick="showBuriedQuizzes()">查看搁置</button>
                </div>
            </div>

            <!-- 分组列表 -->
            <div id="review-groups-container">
                <div class="loading" style="text-align: center; padding: 3rem; font-size: 0.8rem; color: var(--text-muted);">加载分组复习数据...</div>
            </div>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/review-api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 清除旧的复习列表，确保重新进入时使用新列表
            Object.keys(sessionStorage).forEach(key => {
                if (key === 'reviewQuizList' || key.startsWith('groupQuizList_')) {
                    sessionStorage.removeItem(key);
                }
            });

            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            const userSection = document.getElementById('userSection');
            if (userSection) userSection.style.display = 'block';

            await loadHomeSummary();
            await loadGroupReviewData();
        });

        async function loadHomeSummary() {
            try {
                const summary = await ReviewAPI.getTodaySummary();
                // 待学习 = 新测验(NEW) + 学习中已到期(PENDING_LEARN)
                document.getElementById('new-count').textContent = (summary.newCards || 0) + (summary.pendingLearnCount || 0);
                // 待复习 = 复习中已到期(PENDING_REVIEW) + 重学中已到期(PENDING_RELEARN)
                document.getElementById('review-count').textContent = (summary.pendingReviewCount || 0) + (summary.pendingRelearnCount || 0);
                document.getElementById('learning-count').textContent = summary.scheduledCount || 0;
                document.getElementById('suspended-count').textContent = summary.suspendedCount || 0;

                const startBtn = document.getElementById('start-review-btn');
                const totalDue = (summary.newCards || 0) + (summary.pendingLearnCount || 0) + 
                                 (summary.pendingReviewCount || 0) + (summary.pendingRelearnCount || 0);
                
                if (totalDue === 0) {
                    startBtn.disabled = true;
                    startBtn.textContent = '今日已完成';
                    startBtn.style.opacity = '0.5';
                } else {
                    startBtn.disabled = false;
                    startBtn.textContent = '开始复习流';
                    startBtn.style.opacity = '1';
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 分组复习数据
        let allGroupData = [];
        let allGroups = [];
        let allQuizzes = [];
        let activeStatus = 'all';
        let activeGroup = 'all';
        let expandedGroups = new Map();

        async function loadGroupReviewData() {
            try {
                // 同时加载分组复习数据、分组信息和测验数据
                const [groupSummary, groupsRes, quizzesRes] = await Promise.all([
                    ReviewAPI.getGroupSummary(),
                    fetch('/api/groups', { headers: Auth.getAuthHeaders() }),
                    fetch('/api/quizzes', { headers: Auth.getAuthHeaders() })
                ]);
                
                allGroupData = groupSummary || [];
                
                if (groupsRes.ok) {
                    allGroups = await groupsRes.json();
                }
                
                if (quizzesRes.ok) {
                    allQuizzes = await quizzesRes.json();
                }
                
                renderGroupFilters();
                renderGroupReviewList();
            } catch (error) {
                console.error('加载分组复习数据失败:', error);
                document.getElementById('review-groups-container').innerHTML = 
                    '<div style="text-align: center; padding: 2rem; color: var(--error);">加载失败，请刷新重试</div>';
            }
        }

        function renderGroupFilters() {
            const container = document.getElementById('group-filters');
            // 将"默认分组"排在最前
            const sortedGroups = [...allGroups].sort((a, b) => {
                if (a.name === '默认分组') return -1;
                if (b.name === '默认分组') return 1;
                return 0;
            });
            
            sortedGroups.forEach(group => {
                const span = document.createElement('span');
                span.className = 'filter-item';
                span.dataset.group = group.id;
                span.textContent = group.name;
                span.onclick = () => filterByGroup(group.id, span);
                container.appendChild(span);
            });
        }

        function filterByStatus(status, el) {
            activeStatus = status;
            document.querySelectorAll('#status-filters .filter-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            expandedGroups.clear();
            renderGroupReviewList();
            
            // 如果不是"全部"，自动展开所有符合条件的分组
            if (status !== 'all') {
                setTimeout(() => {
                    const visibleGroups = document.querySelectorAll('.review-group-card');
                    visibleGroups.forEach(group => {
                        const groupId = group.dataset.groupId;
                        if (groupId) {
                            toggleGroup(groupId);
                        }
                    });
                }, 100);
            }
        }

        function filterByGroup(groupId, el) {
            activeGroup = groupId;
            document.querySelectorAll('#group-filters .filter-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            expandedGroups.clear();
            renderGroupReviewList();
            
            // 如果不是"全部"，自动展开选中的分组
            if (groupId !== 'all') {
                setTimeout(() => {
                    toggleGroup(groupId);
                }, 100);
            }
        }

        function renderGroupReviewList() {
            const container = document.getElementById('review-groups-container');
            
            let filteredGroups = [...allGroupData];
            
            // 处理分组筛选
            if (activeGroup !== 'all') {
                filteredGroups = filteredGroups.filter(g => g.groupId === activeGroup);
            }
            
            if (activeStatus !== 'all') {
                filteredGroups = filteredGroups.filter(g => {
                    if (activeStatus === 'NEW') return g.newQuizCount > 0;
                    if (activeStatus === 'PENDING_LEARN') return g.pendingLearnCount > 0;
                    if (activeStatus === 'PENDING_RELEARN') return g.pendingRelearnCount > 0;
                    if (activeStatus === 'PENDING_REVIEW') return g.pendingReviewCount > 0;
                    if (activeStatus === 'SCHEDULED') return g.scheduledCount > 0;
                    if (activeStatus === 'SUSPENDED') return g.suspendedCount > 0;
                    return true;
                });
            }

            if (filteredGroups.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted);">暂无匹配的分组或测验</div>';
                return;
            }

            container.innerHTML = filteredGroups.map(groupData => {
                const stats = {
                    newQuizCount: groupData.newQuizCount || 0,
                    pendingLearnCount: groupData.pendingLearnCount || 0,
                    pendingReviewCount: groupData.pendingReviewCount || 0,
                    pendingRelearnCount: groupData.pendingRelearnCount || 0
                };
                return `
                    <div class="review-group-card" data-group-id="${groupData.groupId}">
                        <div class="group-header" onclick="toggleGroup('${groupData.groupId}')">
                            <div class="group-title-section">
                                <span class="group-name">${groupData.groupName}</span>
                                <div class="group-stats">
                                    ${stats.newQuizCount > 0 ? `<span class="stat-tag new">新 ${stats.newQuizCount}</span>` : ''}
                                    ${stats.pendingLearnCount > 0 ? `<span class="stat-tag learning">学 ${stats.pendingLearnCount}</span>` : ''}
                                    ${stats.pendingRelearnCount > 0 ? `<span class="stat-tag relearning">重 ${stats.pendingRelearnCount}</span>` : ''}
                                    ${stats.pendingReviewCount > 0 ? `<span class="stat-tag review">复 ${stats.pendingReviewCount}</span>` : ''}
                                </div>
                            </div>
                            <div class="group-actions">
                                <button class="btn btn-small" onclick="event.stopPropagation(); startGroupReview('${groupData.groupId}')">分组复习</button>
                                <span class="expand-icon">▼</span>
                            </div>
                        </div>
                        <div class="group-content" id="group-content-${groupData.groupId}" style="display: none;">
                            <div class="loading" style="text-align: center; padding: 1rem; font-size: 0.7rem; color: var(--text-muted);">加载中...</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleGroup(groupId) {
            const content = document.getElementById(`group-content-${groupId}`);
            const card = document.querySelector(`[data-group-id="${groupId}"]`);
            const icon = card.querySelector('.expand-icon');
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                icon.textContent = '▲';
                card.classList.add('expanded');
                
                if (!expandedGroups.has(groupId)) {
                    await loadGroupItems(groupId);
                } else {
                    renderGroupItems(groupId, expandedGroups.get(groupId));
                }
            } else {
                content.style.display = 'none';
                icon.textContent = '▼';
                card.classList.remove('expanded');
            }
        }

        async function loadGroupItems(groupId) {
            const content = document.getElementById(`group-content-${groupId}`);
            try {
                const items = await ReviewAPI.getGroupReviewItems(groupId);
                let filteredItems = items;
                if (activeStatus !== 'all') {
                    // 使用 detailedLabel 或 label 进行匹配
                    filteredItems = items.filter(item => {
                        const label = item.detailedLabel || item.label;
                        return label === activeStatus;
                    });
                }
                expandedGroups.set(groupId, filteredItems);
                renderGroupItems(groupId, filteredItems);
            } catch (error) {
                console.error('加载分组测验失败:', error);
                content.innerHTML = '<div style="text-align: center; padding: 1rem; color: var(--error); font-size: 0.75rem;">加载失败</div>';
            }
        }

        function renderGroupItems(groupId, items) {
            const content = document.getElementById(`group-content-${groupId}`);
            if (items.length === 0) {
                content.innerHTML = '<div style="padding: 1rem; color: var(--text-muted); font-size: 0.75rem;">该分组下暂无待复习测验</div>';
                return;
            }
            content.innerHTML = items.map(item => `
                <div class="quiz-item">
                    <div class="quiz-info">
                        <div class="quiz-title-section">
                            <span class="quiz-title">${item.quizTitle}</span>
                            <span class="quiz-status ${getStatusClass(item.detailedLabel || item.label)}">${getStatusText(item.detailedLabel || item.label)}</span>
                        </div>
                        <span class="quiz-meta">间隔: ${item.intervalText || '即将到期'} • 已复习 ${item.reviewCount || 0} 次 • 简易度: ${(item.easeFactor / 1000).toFixed(1)}</span>
                    </div>
                    <div class="quiz-actions">
                        <button class="btn btn-small" onclick="startQuiz(${item.quizId}, '${groupId}')">开始</button>
                        <button class="btn btn-small btn-secondary" onclick="buryQuiz(${item.quizId})">搁置</button>
                        <button class="btn btn-small btn-secondary" onclick="resetQuiz(${item.quizId})">重置</button>
                    </div>
                </div>
            `).join('');
        }

        function getStatusClass(detailedLabel) {
            const map = {
                'NEW': 'status-new',
                'PENDING_LEARN': 'status-learning',
                'PENDING_RELEARN': 'status-relearning',
                'PENDING_REVIEW': 'status-review',
                'SCHEDULED': 'status-scheduled',
                'SUSPENDED': 'status-suspended'
            };
            return map[detailedLabel] || 'status-default';
        }

        function getStatusText(detailedLabel) {
            const map = {
                'NEW': '新测验',
                'PENDING_LEARN': '待学习',
                'PENDING_RELEARN': '待重学',
                'PENDING_REVIEW': '待复习',
                'SCHEDULED': '未到期',
                'SUSPENDED': '已暂停'
            };
            return map[detailedLabel] || detailedLabel;
        }

        async function startQuiz(quizId, groupId) {
            try {
                const groupParam = groupId ? `&groupId=${groupId}` : '';
                
                // 根据模式获取完整列表并存入 sessionStorage
                let items = [];
                if (groupId) {
                    items = await ReviewAPI.getGroupReviewItems(groupId);
                } else {
                    items = await ReviewAPI.getDueItems();
                }

                // 只包含待学习/待复习的测验
                const dueItems = items.filter(item => {
                    const label = item.detailedLabel || item.label;
                    // 统一准入口径：NEW、PENDING_LEARN、PENDING_RELEARN、PENDING_REVIEW 都是需要复习的
                    return label === 'NEW' || label === 'PENDING_LEARN' || label === 'PENDING_RELEARN' || label === 'PENDING_REVIEW';
                });
                
                const quizIds = dueItems.map(i => i.quizId);
                const storageKey = groupId ? `groupQuizList_${groupId}` : 'reviewQuizList';
                sessionStorage.setItem(storageKey, JSON.stringify(quizIds));
                
                window.location.href = `index.html?id=${quizId}${groupParam}&mode=review`;
            } catch (error) {
                console.error('保存复习列表失败:', error);
                const groupParam = groupId ? `&groupId=${groupId}` : '';
                window.location.href = `index.html?id=${quizId}${groupParam}&mode=review`;
            }
        }

        async function startGroupReview(groupId) {
            try {
                const items = await ReviewAPI.getGroupReviewItems(groupId);
                // 只包含待学习/待复习的测验
                const dueItems = items.filter(item => {
                    const label = item.detailedLabel || item.label;
                    // 统一准入口径：NEW、PENDING_LEARN、PENDING_RELEARN、PENDING_REVIEW 都是需要复习的
                    return label === 'NEW' || label === 'PENDING_LEARN' || label === 'PENDING_RELEARN' || label === 'PENDING_REVIEW';
                });

                if (dueItems.length === 0) {
                    alert('该分组暂无待复习测验');
                    return;
                }
                const quizIds = dueItems.map(i => i.quizId);
                sessionStorage.setItem(`groupQuizList_${groupId}`, JSON.stringify(quizIds));
                const groupParam = `&groupId=${groupId}`;
                window.location.href = `index.html?id=${quizIds[0]}&mode=review${groupParam}`;
            } catch (error) {
                alert('获取分组测验列表失败');
            }
        }

        async function buryQuiz(quizId) {
            if (!confirm('确定要搁置这个测验吗？')) return;
            try {
                await ReviewAPI.buryQuiz(quizId);
                await loadGroupReviewData();
            } catch (error) {
                alert('搁置失败');
            }
        }

        async function resetQuiz(quizId) {
            if (!confirm('确定要重置这个测验的复习状态吗？')) return;
            try {
                await ReviewAPI.resetQuiz(quizId);
                await loadGroupReviewData();
            } catch (error) {
                alert('重置失败');
            }
        }

        async function showBuriedQuizzes() {
            try {
                const buried = await ReviewAPI.getBuriedQuizzes();
                if (buried.length === 0) {
                    alert('暂无搁置的测验');
                    return;
                }
                const titles = buried.map(b => b.quizTitle).join('\n');
                alert(`已搁置的测验（共${buried.length}个）:\n${titles}`);
            } catch (error) {
                console.error('获取搁置列表失败:', error);
            }
        }

        async function startDailyReview() {
            try {
                const items = await ReviewAPI.getDueItems();
                // 只包含待学习/待复习的测验
                const dueItems = items.filter(item => {
                    const label = item.detailedLabel || item.label;
                    // 统一准入口径：NEW、PENDING_LEARN、PENDING_RELEARN、PENDING_REVIEW 都是需要复习的
                    return label === 'NEW' || label === 'PENDING_LEARN' || label === 'PENDING_RELEARN' || label === 'PENDING_REVIEW';
                });

                if (dueItems.length === 0) {
                    alert('今日无待复习测验');
                    return;
                }
                const quizIds = dueItems.map(item => item.quizId);
                sessionStorage.setItem('reviewQuizList', JSON.stringify(quizIds));
                window.location.href = `index.html?id=${quizIds[0]}&mode=review`;
            } catch (error) {
                alert('获取复习列表失败');
            }
        }
    </script>
</body>
</html>
