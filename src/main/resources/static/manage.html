<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敲脑壳 MindPop - 测验管理</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <!-- Brand Logo & Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/img/brand/logo/主logo.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/brand/favicon/apple-touch-icon.png">
    <style>
        body {
            background-color: var(--bg);
        }
        .manage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        /* 分组卡片样式 - 复刻首页 */
        .group-card {
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            background: var(--bg);
            transition: all 0.2s ease;
        }
        .group-card:hover {
            border-color: var(--accent);
        }
        .group-card.expanded {
            border-color: var(--accent);
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .group-header:hover {
            background: var(--hover);
        }
        .group-title-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .group-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }
        .group-desc {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .group-stats {
            display: flex;
            gap: 0.5rem;
        }
        .stat-tag {
            font-size: 0.6rem;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .stat-tag.quiz-count {
            background: var(--hover);
            color: var(--text-muted);
        }
        .group-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .expand-icon {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }
        .group-content {
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        /* 测验项样式 */
        .quiz-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .quiz-item:last-child {
            border-bottom: none;
        }
        .quiz-item:hover {
            background: var(--hover);
        }
        .quiz-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 1;
            min-width: 0; /* 允许收缩 */
            margin-right: 0.75rem;
        }
        .quiz-title {
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .quiz-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .quiz-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .quiz-actions .btn-small {
            padding: 0.4rem 0.75rem;
            font-size: 0.7rem;
        }
        
        /* 移动端测验项优化 */
        @media (max-width: 640px) {
            .quiz-item {
                flex-direction: column;
                align-items: flex-start;
                padding: 1rem;
                gap: 0.75rem;
            }
            .quiz-info {
                margin-right: 0;
                width: 100%;
            }
            .quiz-title, .quiz-meta {
                white-space: normal;
                overflow: visible;
                text-overflow: clip;
            }
            .quiz-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
        
        @media (max-width: 480px) {
            .quiz-actions .btn-small {
                padding: 0.35rem 0.5rem;
                font-size: 0.65rem;
            }
        }
        .btn-secondary {
            border-color: var(--border);
            color: var(--text-muted);
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-danger {
            border-color: var(--error);
            color: var(--error);
        }
        .btn-danger:hover {
            background: var(--error);
            color: white;
        }

        /* 筛选器样式 */
        .filter-bar {
            margin-bottom: 1.5rem;
        }
        .filter-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }
        .filter-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }
        .filter-item {
            font-size: 0.75rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.25rem 0;
        }
        .filter-item:hover, .filter-item.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--text-main);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="logo">
            <img src="assets/img/brand/logo/主logo.svg" alt="敲脑壳 MindPop" style="height: 32px; width: auto;">
        </a>
        <div class="nav-links">
            <a href="home.html">首页</a>
            <a href="quizzes.html">测验</a>
            <a href="create.html">创建</a>
            <a href="stats.html">看板</a>
            <a href="manage.html" class="active">管理</a>
            <a href="settings.html">设置</a>
            <a href="#" onclick="Auth.logout()" style="color: var(--error); margin-left: 2rem;">退出</a>
        </div>
    </nav>

    <div id="quiz-container" class="fade-in">
        <div class="page-header" style="text-align: center; padding: 2rem 0 3rem;">
            <h1 style="font-weight: 300; font-size: 2rem; letter-spacing: 0.05em; color: var(--text-main); margin-bottom: 0.5rem;">测验与分组管理</h1>
            <p style="font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.05em;">导入、导出和组织你的测验</p>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-bottom: 2rem;">
            <button class="btn btn-small" onclick="showImportModal()">导入</button>
            <button class="btn btn-small" onclick="exportAllQuizzes()">导出全部</button>
            <button class="btn btn-small" onclick="showGroupModal()">新建分组</button>
        </div>

        <!-- 筛选器 -->
        <div class="filter-bar">
            <div class="filter-row">
                <span class="filter-label">分组</span>
                <div id="group-filters" style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                    <span class="filter-item active" data-group="all" onclick="filterByGroup('all', this)">全部</span>
                    <!-- 动态填充其他分组 -->
                </div>
            </div>
            <div class="filter-row">
                <span class="filter-label">分类</span>
                <div id="type-filters" style="display: flex; gap: 1.5rem;">
                    <span class="filter-item active" data-type="all" onclick="filterByType('all', this)">全部</span>
                    <span class="filter-item" data-type="TYPING" onclick="filterByType('TYPING', this)">打字</span>
                    <span class="filter-item" data-type="FILL_BLANK" onclick="filterByType('FILL_BLANK', this)">填空</span>
                </div>
            </div>
        </div>

        <!-- 批量操作栏 -->
        <div id="batch-actions" style="display: none; margin-bottom: 1.5rem; padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <input type="checkbox" id="select-all-quizzes" onchange="toggleSelectAllQuizzes(this)" style="cursor: pointer;">
                    <label for="select-all-quizzes" style="cursor: pointer; font-size: 0.75rem; color: var(--text-main);">全选</label>
                    <span style="font-size: 0.65rem; color: var(--text-muted);">（仅选中展开分组的测验）</span>
                    <span id="selected-count" style="font-size: 0.7rem; color: var(--text-muted);">已选择 0 项</span>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-small btn-secondary" onclick="batchExportQuizzes()">批量导出</button>
                    <button class="btn btn-small btn-danger" onclick="batchDeleteQuizzes()">批量删除</button>
                </div>
            </div>
        </div>

        <!-- 分组列表 -->
        <div id="groups-container">
            <div class="loading" style="text-align: center; padding: 3rem; font-size: 0.8rem; color: var(--text-muted);">加载中...</div>
        </div>
    </div>

    <!-- 分组模态框 -->
    <div id="group-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
        <div style="background: var(--bg); padding: 2rem; max-width: 600px; width: 90%; border-radius: 4px; max-height: 80vh; overflow-y: auto;">
            <h3 id="group-modal-title" style="margin-bottom: 1.5rem; font-weight: 300;">新建分组</h3>
            <input type="hidden" id="group-id">
            <div class="form-group">
                <label class="form-label">分组名称 *</label>
                <input type="text" id="group-name" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">描述</label>
                <textarea id="group-description" class="form-input" style="height: 80px;" placeholder="请输入分组描述..."></textarea>
            </div>
            <!-- 测验选择区域（编辑时显示） -->
            <div class="form-group" id="quiz-selection-area" style="display: none;">
                <label class="form-label">选择要包含的测验</label>
                <div id="quiz-checkboxes" style="max-height: 250px; overflow-y: auto; border: 1px solid var(--border); padding: 0.75rem; border-radius: 4px;">
                    <!-- 动态填充测验复选框 -->
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn btn-small" onclick="closeGroupModal()">取消</button>
                <button class="btn btn-small" onclick="saveGroup()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/track.js"></script>
    <script>
        // 数据存储
        let allQuizzes = [];
        let allGroups = [];
        let expandedGroups = new Map();
        let activeGroupFilter = 'all';
        let activeTypeFilter = 'all';
        let selectedQuizzes = new Set(); // 选中的测验ID集合

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof Auth !== 'undefined' && !Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }
            await loadData();
        });

        // 获取认证头
        function getAuthHeaders() {
            const headers = { 'Content-Type': 'application/json' };
            const token = localStorage.getItem('typingquiz_token');
            if (token) headers['Authorization'] = `Bearer ${token}`;
            return headers;
        }

        // 加载所有数据
        async function loadData() {
            try {
                const [quizzesRes, groupsRes] = await Promise.all([
                    fetch('/api/quizzes', { headers: getAuthHeaders() }),
                    fetch('/api/groups', { headers: getAuthHeaders() })
                ]);

                allQuizzes = await quizzesRes.json();
                allGroups = await groupsRes.json();

                renderGroupFilters();
                renderGroups();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('groups-container').innerHTML = 
                    '<div style="text-align: center; padding: 2rem; color: var(--error);">加载失败，请刷新重试</div>';
            }
        }

        // 渲染分组筛选器
        function renderGroupFilters() {
            const container = document.getElementById('group-filters');
            // 将"默认分组"排在最前
            const sortedGroups = [...allGroups].sort((a, b) => {
                if (a.name === '默认分组') return -1;
                if (b.name === '默认分组') return 1;
                return 0;
            });
            
            sortedGroups.forEach(group => {
                const span = document.createElement('span');
                span.className = 'filter-item';
                span.dataset.group = group.id;
                span.textContent = group.name;
                span.onclick = () => filterByGroup(group.id, span);
                container.appendChild(span);
            });
        }

        // 分组筛选
        function filterByGroup(groupId, el) {
            activeGroupFilter = groupId;
            document.querySelectorAll('#group-filters .filter-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            expandedGroups.clear();
            renderGroups();

            // 自动展开
            if (groupId !== 'all') {
                setTimeout(() => {
                    toggleGroup(groupId);
                }, 100);
            }
        }

        // 类型筛选
        function filterByType(type, el) {
            activeTypeFilter = type;
            document.querySelectorAll('#type-filters .filter-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            expandedGroups.clear();
            renderGroups();

            // 自动展开所有可见分组
            if (type !== 'all') {
                setTimeout(() => {
                    const visibleGroups = document.querySelectorAll('.group-card');
                    visibleGroups.forEach(group => {
                        const groupId = group.dataset.groupId;
                        if (groupId) {
                            toggleGroup(groupId);
                        }
                    });
                }, 100);
            }
        }

        // 获取测验所属的分组ID列表
        function getQuizGroupIds(quizId) {
            const groupIds = [];
            allGroups.forEach(group => {
                if (group.quizIds && group.quizIds.includes(quizId)) {
                    groupIds.push(group.id);
                }
            });
            return groupIds;
        }

        // 渲染分组列表
        function renderGroups() {
            const container = document.getElementById('groups-container');
            let groupsToRender = [];

            // 处理分组筛选
            if (activeGroupFilter === 'all') {
                groupsToRender = [...allGroups];
            } else {
                const group = allGroups.find(g => g.id == activeGroupFilter);
                if (group) groupsToRender = [group];
            }

            if (groupsToRender.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无匹配的分组或测验</div>';
                return;
            }

            container.innerHTML = groupsToRender.map(group => {
                const quizCount = group.quizIds ? group.quizIds.length : 0;
                return `
                    <div class="group-card" data-group-id="${group.id}">
                        <div class="group-header" onclick="toggleGroup('${group.id}')">
                            <div class="group-title-section">
                                <span class="group-name">${group.name}</span>
                                <span class="group-desc">${group.description || '无描述'}</span>
                                <div class="group-stats">
                                    <span class="stat-tag quiz-count">${quizCount} 个测验</span>
                                </div>
                            </div>
                            <div class="group-actions">
                                <button class="btn btn-small" onclick="event.stopPropagation(); exportGroup('${group.id}')">导出</button>
                                <button class="btn btn-small" onclick="event.stopPropagation(); editGroup('${group.id}')">编辑</button>
                                <span class="expand-icon">▼</span>
                            </div>
                        </div>
                        <div class="group-content" id="group-content-${group.id}" style="display: none;">
                            <div class="loading" style="text-align: center; padding: 1rem; font-size: 0.7rem; color: var(--text-muted);">加载中...</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 展开/收起分组
        async function toggleGroup(groupId) {
            const content = document.getElementById(`group-content-${groupId}`);
            const card = document.querySelector(`[data-group-id="${groupId}"]`);
            if (!card) return;
            const icon = card.querySelector('.expand-icon');
            if (!icon) return;

            if (!content) return;
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                if (icon) icon.textContent = '▲';
                card.classList.add('expanded');

                if (!expandedGroups.has(groupId)) {
                    await loadGroupQuizzes(groupId);
                } else {
                    renderGroupQuizzes(groupId, expandedGroups.get(groupId));
                }
            } else {
                content.style.display = 'none';
                if (icon) icon.textContent = '▼';
                card.classList.remove('expanded');
            }
        }

        // 加载分组内的测验
        async function loadGroupQuizzes(groupId) {
            const content = document.getElementById(`group-content-${groupId}`);
            if (!content) return;

            let quizzes = [];
            const group = allGroups.find(g => g.id == groupId);
            if (group && group.quizIds) {
                quizzes = allQuizzes.filter(quiz => group.quizIds.includes(quiz.id));
            }

            // 应用类型筛选
            if (activeTypeFilter !== 'all') {
                quizzes = quizzes.filter(quiz => quiz.quizType === activeTypeFilter);
            }

            expandedGroups.set(groupId, quizzes);
            renderGroupQuizzes(groupId, quizzes);
        }

        // 渲染分组内的测验
        function renderGroupQuizzes(groupId, quizzes) {
            const content = document.getElementById(`group-content-${groupId}`);

            if (quizzes.length === 0) {
                content.innerHTML = '<div style="padding: 1rem; color: var(--text-muted); font-size: 0.75rem;">该分组下暂无测验</div>';
                return;
            }

            content.innerHTML = quizzes.map(quiz => {
                const createdDate = quiz.createdAt ? new Date(quiz.createdAt).toLocaleDateString('zh-CN') : '未知';
                const typeText = quiz.quizType === 'TYPING' ? '打字' : '填空';
                const answerCount = quiz.totalAnswers || 0;
                const isSelected = selectedQuizzes.has(quiz.id) ? 'checked' : '';

                return `
                    <div class="quiz-item" style="${isSelected ? 'background: var(--bg);' : ''}">
                        <input type="checkbox" id="quiz-cb-${quiz.id}" value="${quiz.id}" ${isSelected} 
                            onchange="toggleQuizSelection(${quiz.id})" style="margin-right: 0.75rem; cursor: pointer;">
                        <div class="quiz-info" style="flex: 1;">
                            <span class="quiz-title">${quiz.title}</span>
                            <span class="quiz-meta">${typeText} • ${answerCount} 个答案 • 创建于 ${createdDate}</span>
                        </div>
                        <div class="quiz-actions">
                            <button class="btn btn-small btn-secondary" onclick="exportQuiz(${quiz.id})">导出</button>
                            <button class="btn btn-small btn-secondary" onclick="editQuiz(${quiz.id})">编辑</button>
                            <button class="btn btn-small btn-danger" onclick="deleteQuiz(${quiz.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 更新批量操作栏状态
            updateBatchActions();
        }

        // 切换测验选择状态
        function toggleQuizSelection(quizId) {
            if (selectedQuizzes.has(quizId)) {
                selectedQuizzes.delete(quizId);
            } else {
                selectedQuizzes.add(quizId);
            }
            updateBatchActions();
            
            // 更新对应测验项的样式
            const cb = document.getElementById(`quiz-cb-${quizId}`);
            const item = cb?.closest('.quiz-item');
            if (item) {
                item.style.background = cb.checked ? 'var(--hover)' : '';
            }
        }

        // 全选/取消全选 - 只选中当前可见的测验
        function toggleSelectAllQuizzes(source) {
            // 只选中当前在DOM中可见的测验复选框
            const visibleCheckboxes = Array.from(document.querySelectorAll('[id^="quiz-cb-"]')).filter(cb => {
                return cb.offsetParent !== null; // 只选择可见的元素
            });
            
            visibleCheckboxes.forEach(cb => {
                cb.checked = source.checked;
                const quizId = parseInt(cb.value);
                if (source.checked) {
                    selectedQuizzes.add(quizId);
                } else {
                    selectedQuizzes.delete(quizId);
                }
                const item = cb.closest('.quiz-item');
                if (item) {
                    item.style.background = cb.checked ? 'var(--hover)' : '';
                }
            });
            updateBatchActions();
        }

        // 更新批量操作栏状态
        function updateBatchActions() {
            const batchActions = document.getElementById('batch-actions');
            const selectedCount = document.getElementById('selected-count');
            const selectAll = document.getElementById('select-all-quizzes');
            
            if (selectedQuizzes.size > 0) {
                batchActions.style.display = 'block';
            } else {
                batchActions.style.display = 'none';
            }
            
            selectedCount.textContent = `已选择 ${selectedQuizzes.size} 项`;
            
            // 更新全选复选框状态
            const totalCheckboxes = document.querySelectorAll('#group-content input[type="checkbox"][id^="quiz-cb-"]').length;
            const checkedCheckboxes = document.querySelectorAll('#group-content input[type="checkbox"][id^="quiz-cb-"]:checked').length;
            if (totalCheckboxes > 0) {
                selectAll.checked = checkedCheckboxes === totalCheckboxes;
                selectAll.indeterminate = checkedCheckboxes > 0 && checkedCheckboxes < totalCheckboxes;
            }
        }

        // 批量导出测验
        async function batchExportQuizzes() {
            if (selectedQuizzes.size === 0) {
                alert('请先选择要导出的测验');
                return;
            }
            
            const ids = Array.from(selectedQuizzes);
            try {
                const res = await fetch('/api/import-export/quizzes/export', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(ids)
                });
                if (!res.ok) { alert('导出失败'); return; }
                const data = await res.json();
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `quizzes_batch_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('导出失败: ' + e.message);
            }
        }

        // 批量删除测验
        async function batchDeleteQuizzes() {
            if (selectedQuizzes.size === 0) {
                alert('请先选择要删除的测验');
                return;
            }
            
            const count = selectedQuizzes.size;
            if (!confirm(`确定要删除选中的 ${count} 个测验吗？此操作不可恢复。`)) return;
            
            const ids = Array.from(selectedQuizzes);
            let successCount = 0;
            let failCount = 0;
            
            for (const id of ids) {
                try {
                    const res = await fetch(`/api/quizzes/${id}`, { 
                        method: 'DELETE', 
                        headers: getAuthHeaders() 
                    });
                    if (res.ok) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                } catch (e) {
                    failCount++;
                }
            }
            
            alert(`删除完成: 成功 ${successCount} 个, 失败 ${failCount} 个`);
            selectedQuizzes.clear();
            await loadData();
        }

        // 导出分组
        async function exportGroup(groupId) {
            try {
                const res = await fetch(`/api/import-export/group/${groupId}/export`, { headers: getAuthHeaders() });
                if (!res.ok) { alert('导出失败'); return; }
                const data = await res.json();

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `group_${groupId}_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('导出失败');
            }
        }

        // 导出单个测验
        async function exportQuiz(quizId) {
            try {
                const res = await fetch(`/api/import-export/quiz/${quizId}/export`, { headers: getAuthHeaders() });
                if (!res.ok) { alert('导出失败'); return; }
                const data = await res.json();

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `quiz_${quizId}_${data.title || 'export'}.json`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('导出失败');
            }
        }

        // 显示导入模态框
        function showImportModal() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = handleFileImport;
            input.click();
        }

        // 处理文件导入
        async function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            try {
                const text = await file.text();
                const data = JSON.parse(text);
                
                // 判断是单个测验还是多个测验
                const isArray = Array.isArray(data);
                const quizzes = isArray ? data : [data];
                
                // 验证数据格式
                for (const quiz of quizzes) {
                    if (!quiz.title) {
                        alert('文件格式不正确,请确保包含title字段');
                        return;
                    }
                    // 打字题需要answers或answerList，填空题需要fillBlankQuiz
                    const isFillBlank = quiz.quizType === 'FILL_BLANK';
                    if (isFillBlank) {
                        if (!quiz.fillBlankQuiz && !quiz.fullText) {
                            alert('文件格式不正确,填空题需要fillBlankQuiz或fullText字段');
                            return;
                        }
                    } else {
                        if (!quiz.answers && !quiz.answerList) {
                            alert('文件格式不正确,打字题需要answers或answerList字段');
                            return;
                        }
                    }
                }
                
                // 转换数据格式（兼容wechat_notes_to_quiz生成的格式）
                const normalizedQuizzes = quizzes.map(quiz => {
                    // 如果是填空题且没有fillBlankQuiz字段，但有fullText字段，需要转换
                    if (quiz.quizType === 'FILL_BLANK' && !quiz.fillBlankQuiz && quiz.fullText) {
                        return {
                            ...quiz,
                            fillBlankQuiz: {
                                fullText: quiz.fullText,
                                displayText: quiz.displayText || quiz.fullText,
                                blanks: quiz.blanks || [],
                                blanksCount: quiz.blanksCount || (quiz.blanks ? quiz.blanks.length : 0)
                            }
                        };
                    }
                    return quiz;
                });
                
                // 导入
                const response = await fetch('/api/import-export/quizzes/import', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(normalizedQuizzes)
                });
                
                const result = await response.json();
                
                // 显示结果
                let message = `导入完成!\n成功: ${result.successCount} 个\n失败: ${result.failureCount} 个`;
                
                if (result.failures && result.failures.length > 0) {
                    message += '\n\n失败的测验:\n';
                    result.failures.forEach(f => {
                        message += `- ${f.title}: ${f.error}\n`;
                    });
                }
                
                alert(message);
                loadData();
            } catch (error) {
                console.error('导入失败:', error);
                alert('导入失败: ' + error.message);
            }
        }

        // 编辑分组
        async function editGroup(id) {
            const group = allGroups.find(g => g.id == id);
            if (!group) return;

            document.getElementById('group-id').value = id;
            document.getElementById('group-name').value = group.name;
            document.getElementById('group-description').value = group.description || '';
            document.getElementById('group-modal-title').textContent = '编辑分组';
            
            // 显示测验选择区域并填充数据
            document.getElementById('quiz-selection-area').style.display = 'block';
            renderQuizCheckboxes(group.quizIds || []);
            
            showGroupModal();
        }

        // 渲染测验复选框列表
        function renderQuizCheckboxes(selectedQuizIds) {
            const container = document.getElementById('quiz-checkboxes');
            const selectedSet = new Set(selectedQuizIds.map(id => parseInt(id)));
            
            if (allQuizzes.length === 0) {
                container.innerHTML = '<div style="color: var(--text-muted); font-size: 0.75rem;">暂无测验</div>';
                return;
            }
            
            container.innerHTML = allQuizzes.map(quiz => {
                const isChecked = selectedSet.has(quiz.id) ? 'checked' : '';
                const answerCount = quiz.totalAnswers || 0;
                return `
                    <div style="display: flex; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border);">
                        <input type="checkbox" id="quiz-cb-${quiz.id}" value="${quiz.id}" ${isChecked} 
                            style="margin-right: 0.75rem; cursor: pointer;">
                        <label for="quiz-cb-${quiz.id}" style="cursor: pointer; font-size: 0.8rem; flex: 1;">
                            ${quiz.title}
                            <span style="color: var(--text-muted); font-size: 0.7rem;">(${answerCount}个答案)</span>
                        </label>
                    </div>
                `;
            }).join('');
        }

        // 编辑测验
        function editQuiz(id) {
            window.location.href = `create.html?id=${id}`;
        }

        // 删除测验
        async function deleteQuiz(id) {
            if (!confirm('确定删除该测验吗？')) return;
            try {
                const res = await fetch(`/api/quizzes/${id}`, { 
                    method: 'DELETE', 
                    headers: getAuthHeaders() 
                });
                if (res.ok) {
                    await loadData();
                }
            } catch (e) {
                alert('删除失败');
            }
        }

        function showGroupModal() {
            document.getElementById('group-modal').style.display = 'flex';
        }

        function closeGroupModal() {
            document.getElementById('group-modal').style.display = 'none';
            document.getElementById('group-id').value = '';
            document.getElementById('group-name').value = '';
            document.getElementById('group-description').value = '';
            document.getElementById('quiz-selection-area').style.display = 'none';
            document.getElementById('quiz-checkboxes').innerHTML = '';
            document.getElementById('group-modal-title').textContent = '新建分组';
        }

        async function saveGroup() {
            const id = document.getElementById('group-id').value;
            const name = document.getElementById('group-name').value.trim();
            const description = document.getElementById('group-description').value.trim();

            if (!name) {
                alert('请输入名称');
                return;
            }

            // 收集选中的测验ID
            const selectedQuizIds = [];
            if (id) { // 编辑模式时才收集
                document.querySelectorAll('#quiz-checkboxes input[type="checkbox"]:checked').forEach(cb => {
                    selectedQuizIds.push(parseInt(cb.value));
                });
            }

            const data = { 
                name, 
                description,
                quizIds: selectedQuizIds
            };
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/groups/${id}` : '/api/groups';

            try {
                const res = await fetch(url, {
                    method,
                    headers: getAuthHeaders(),
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    closeGroupModal();
                    await loadData();
                } else {
                    alert('保存失败');
                }
            } catch (e) {
                alert('保存失败');
            }
        }

        // 导出全部测验
        async function exportAllQuizzes() {
            try {
                const res = await fetch('/api/import-export/quizzes/export', { headers: getAuthHeaders() });
                if (!res.ok) { alert('导出失败'); return; }
                const data = await res.json();

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `all_quizzes_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                alert(`成功导出 ${data.length} 个测验`);
            } catch (e) {
                alert('导出失败');
            }
        }
    </script>
</body>
