<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测验管理 - Typing Quiz</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <style>
        body {
            background-color: var(--bg);
        }
        .manage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .bulk-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--hover);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="logo">打字测验</a>
        <div class="nav-links">
            <a href="home.html">首页</a>
            <a href="quizzes.html">测验</a>
            <a href="create.html">创建</a>
            <a href="manage.html" class="active">管理</a>
            <a href="#" onclick="Auth.logout()" style="color: var(--error); margin-left: 2rem;">退出</a>
        </div>
    </nav>

    <div id="quiz-container" class="fade-in">
        <div class="manage-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="font-weight: 300; font-size: 1.2rem; letter-spacing: 0.1em;">测验与分组管理</h1>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-small" onclick="exportAllQuizzes()">全部导出</button>
                <button class="btn btn-small" onclick="showGroupModal()">新建分组</button>
            </div>
        </div>

        <!-- 批量操作栏 (极简风格) -->
        <div id="bulk-actions-bar" class="bulk-actions" style="display: none; align-items: center; gap: 1rem; padding: 1rem; background: var(--hover); margin-bottom: 1.5rem;">
            <input type="checkbox" id="select-all-quizzes" onchange="toggleSelectAll(this)">
            <span id="selected-count" style="margin-right: auto; font-size: 0.75rem;">已选 0 项</span>
            <button class="btn btn-small" style="border-color: var(--error); color: var(--error);" onclick="bulkDelete()">批量删除</button>
            <button class="btn btn-small" onclick="showBulkGroupModal()">批量移动</button>
        </div>

        <h2 style="font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">分组列表</h2>
        <div id="group-list">
            <!-- 动态填充 -->
            <div class="loading" style="text-align: center; padding: 1rem; font-size: 0.7rem; color: var(--text-muted);">分组加载中...</div>
        </div>

        <h2 style="font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 3rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">所有测验</h2>
        <div id="quiz-list">
            <!-- 动态填充 -->
            <div class="loading" style="text-align: center; padding: 1rem; font-size: 0.7rem; color: var(--text-muted);">测验加载中...</div>
        </div>
    </div>

    <!-- 分组模态框 (极简版) -->
    <div id="group-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
        <div style="background: white; padding: 2rem; max-width: 500px; width: 90%; border-radius: 4px;">
            <h3 id="group-modal-title" style="margin-bottom: 1.5rem; font-weight: 300;">新建分组</h3>
            <input type="hidden" id="group-id">
            <div class="form-group">
                <label class="form-label">名称 *</label>
                <input type="text" id="group-name" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">描述</label>
                <textarea id="group-description" class="form-input" style="height: 60px;"></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn btn-small" onclick="closeGroupModal()">取消</button>
                <button class="btn btn-small" onclick="saveGroup()">确认</button>
            </div>
        </div>
    </div>

    <!-- 批量分组模态框 -->
    <div id="bulk-group-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
        <div style="background: white; padding: 2rem; max-width: 400px; width: 90%; border-radius: 4px;">
            <h3 style="margin-bottom: 1.5rem; font-weight: 300;">移动到分组</h3>
            <div class="form-group">
                <select id="bulk-group-select" class="form-input">
                    <!-- 动态填充 -->
                </select>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn btn-small" onclick="closeBulkGroupModal()">取消</button>
                <button class="btn btn-small" onclick="bulkAddToGroup()">确认移动</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/manage.js"></script>
    <script>
        // 覆盖 manage.js 中的渲染逻辑以匹配极简风格
        function renderQuizList(quizzes) {
            const container = document.getElementById('quiz-list');
            if (quizzes.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem;">暂无测验</div>';
                return;
            }
            container.innerHTML = quizzes.map(quiz => `
                <div class="list-item">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <input type="checkbox" class="quiz-checkbox" value="${quiz.id}" onchange="updateSelectedCount()">
                        <div class="list-info">
                            <span class="title">${quiz.title}</span>
                            <span class="sub">ID: ${quiz.id} • ${quiz.quizType === 'TYPING' ? '打字题' : '填空题'}</span>
                        </div>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-small" onclick="editQuiz(${quiz.id})">编辑</button>
                        <button class="btn btn-small" style="border-color: var(--error); color: var(--error);" onclick="deleteQuiz(${quiz.id})">删除</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('bulk-actions-bar').style.display = 'flex';
        }

        function renderGroupList(groups) {
            const container = document.getElementById('group-list');
            if (groups.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem;">暂无分组</div>';
                return;
            }
            container.innerHTML = groups.map(group => `
                <div class="list-item">
                    <div class="list-info">
                        <span class="title">${group.name}</span>
                        <span class="sub">${group.quizIds ? group.quizIds.length : 0} 个测验 • ${group.description || '无描述'}</span>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-small" onclick="editGroup(${group.id})">编辑</button>
                        <button class="btn btn-small" style="border-color: var(--error); color: var(--error);" onclick="deleteGroup(${group.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function updateSelectedCount() {
            const checked = document.querySelectorAll('.quiz-checkbox:checked').length;
            document.getElementById('selected-count').textContent = `已选 ${checked} 项`;
        }

        function toggleSelectAll(el) {
            document.querySelectorAll('.quiz-checkbox').forEach(cb => cb.checked = el.checked);
            updateSelectedCount();
        }

        // 重新定义编辑跳转，因为创建页已独立
        function editQuiz(id) {
            window.location.href = `create.html?id=${id}`;
        }
    </script>
</body>
    <script src="js/manage.js"></script>
</body>
</html>
