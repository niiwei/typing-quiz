<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敲脑壳 MindPop - 创建测验</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <!-- Brand Logo & Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/img/brand/logo/主logo.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/brand/favicon/apple-touch-icon.png">
    <style>
        /* 创建页面专用样式 - 极简主义 */
        .create-page {
            background-color: var(--bg);
        }

        /* 页面标题区 - 居中，与其他页面一致 */
        .create-hero {
            text-align: center;
            padding: 4rem 0 3rem;
        }

        .create-hero h1 {
            font-weight: 300;
            font-size: 2rem;
            letter-spacing: 0.05em;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .create-hero .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* 主容器 - 紧凑布局 */
        .create-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        /* 卡片区块 - 统一边框风格 */
        .create-section {
            border: 1px solid var(--border);
            background: var(--bg);
            margin-bottom: 1.5rem;
        }

        .section-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--hover);
        }

        .section-header h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin: 0;
        }

        .section-body {
            padding: 1.5rem;
        }

        /* 表单元素基础样式 */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .form-label .optional {
            font-weight: 400;
            color: var(--text-muted);
            text-transform: none;
            letter-spacing: 0;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 0.9rem;
            color: var(--text-main);
            transition: border-color 0.2s;
            outline: none;
            border-radius: 0;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 120px;
        }

        /* 测验类型选择 - 横向标签式 */
        .type-selector {
            display: flex;
            gap: 0.5rem;
        }

        .type-option {
            flex: 1;
            position: relative;
        }

        .type-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .type-label {
            display: block;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg);
        }

        .type-label:hover {
            border-color: var(--text-muted);
        }

        .type-option input[type="radio"]:checked + .type-label {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .type-label .type-icon {
            display: block;
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .type-label .type-name {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 元信息行 - 分组和时间 */
        .meta-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        /* 答案编辑区 */
        .answer-editor {
            position: relative;
        }

        .editor-toolbar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            justify-content: flex-end;
        }

        .toolbar-btn {
            padding: 0.35rem 0.75rem;
            font-size: 0.65rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .toolbar-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 填空题预览 */
        .fill-preview {
            padding: 1rem 1.25rem;
            background: var(--hover);
            border-left: 3px solid var(--accent);
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text-main);
        }

        .fill-preview .blank-slot {
            display: inline-block;
            min-width: 60px;
            padding: 0.2rem 0.5rem;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        /* 操作按钮区 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            margin-top: 1.5rem;
        }

        .action-secondary {
            display: flex;
            gap: 1rem;
        }

        .btn-text {
            padding: 0.75rem 1.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-text:hover {
            color: var(--text-main);
        }

        /* 隐藏区块 */
        .type-fields {
            display: none;
        }

        .type-fields.active {
            display: block;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .create-hero h1 {
                font-size: 2rem;
            }

            .meta-row {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .type-selector {
                flex-direction: column;
            }

            .action-bar {
                flex-direction: column-reverse;
                gap: 1rem;
            }
        }
    </style>
</head>
<body class="create-page">
    <nav class="navbar">
        <a href="home.html" class="logo">
            <img src="assets/img/brand/logo/主logo.svg" alt="敲脑壳 MindPop" style="height: 32px; width: auto;">
        </a>
        <div class="nav-links">
            <a href="home.html">首页</a>
            <a href="quizzes.html">测验</a>
            <a href="create.html" class="active">创建</a>
            <a href="stats.html">看板</a>
            <a href="manage.html">管理</a>
            <a href="settings.html">设置</a>
            <a href="#" onclick="Auth.logout()" style="color: var(--error); margin-left: 2rem;">退出</a>
        </div>
    </nav>

    <!-- 页面标题区 - 居中 -->
    <div class="create-hero">
        <h1 id="page-title">创建新测验</h1>
        <p class="subtitle">设计你的知识挑战</p>
    </div>

    <!-- 主容器 -->
    <div class="create-container">
        <form id="quiz-form" onsubmit="return false;">
            
            <!-- 基本信息区 -->
            <div class="create-section">
                <div class="section-header">
                    <h2>基本信息</h2>
                </div>
                <div class="section-body">
                    <div class="form-group">
                        <label class="form-label">测验标题 *</label>
                        <input type="text" id="quiz-title" class="form-input" placeholder="例如：世界各国首都" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">描述 <span class="optional">(可选)</span></label>
                        <textarea id="quiz-description" class="form-input" style="min-height: 80px;" placeholder="简要描述这个测验的内容..."></textarea>
                    </div>
                </div>
            </div>

            <!-- 测验类型选择 - 核心区域 -->
            <div class="create-section">
                <div class="section-header">
                    <h2>测验类型</h2>
                </div>
                <div class="section-body">
                    <div class="type-selector">
                        <div class="type-option">
                            <input type="radio" name="quiz-type" value="TYPING" id="type-typing" checked onchange="toggleTypeFields()">
                            <label for="type-typing" class="type-label">
                                <span class="type-icon">⌨️</span>
                                <span class="type-name">打字题</span>
                            </label>
                        </div>
                        <div class="type-option">
                            <input type="radio" name="quiz-type" value="FILL_BLANK" id="type-fillblank" onchange="toggleTypeFields()">
                            <label for="type-fillblank" class="type-label">
                                <span class="type-icon">📝</span>
                                <span class="type-name">填空题</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 元信息：分组与时间 -->
            <div class="create-section">
                <div class="section-header">
                    <h2>设置</h2>
                </div>
                <div class="section-body">
                    <div class="meta-row">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">所属分组</label>
                            <select id="quiz-group-select" class="form-input">
                                <option value="">默认分组</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">时间限制 <span class="optional">(秒，可选)</span></label>
                            <input type="number" id="quiz-time-limit" class="form-input" placeholder="无限制" min="0">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 打字题内容区 -->
            <div id="typing-fields" class="type-fields active">
                <div class="create-section">
                    <div class="section-header">
                        <h2>答案列表</h2>
                    </div>
                    <div class="section-body">
                        <div class="editor-toolbar">
                            <button type="button" class="toolbar-btn" onclick="wrapSelectionWithHash('quiz-answers')">添加注释</button>
                        </div>
                        <div class="answer-editor">
                            <textarea id="quiz-answers" class="form-input" style="min-height: 200px; font-family: monospace;" placeholder="每行一个答案&#10;北京#首都#&#10;东京#首都#&#10;巴黎"></textarea>
                        </div>
                        <p style="margin-top: 0.75rem; font-size: 0.75rem; color: var(--text-muted);">
                            使用 <code style="background: var(--hover); padding: 0.1rem 0.3rem;">#注释#</code> 格式添加答案注释
                        </p>
                    </div>
                </div>
            </div>

            <!-- 填空题内容区 -->
            <div id="fill-blank-fields" class="type-fields">
                <div class="create-section">
                    <div class="section-header">
                        <h2>题目内容</h2>
                    </div>
                    <div class="section-body">
                        <div class="editor-toolbar">
                            <button type="button" class="toolbar-btn" onclick="wrapSelectionWithBrackets()">挖空选中</button>
                            <button type="button" class="toolbar-btn" onclick="wrapSelectionWithHash('fill-blank-full-text')">添加注释</button>
                            <a href="ai-create.html" class="toolbar-btn" style="margin-left: auto; color: var(--accent); border-color: var(--accent); text-decoration: none; display: inline-block;">🤖 AI 批量创建</a>
                        </div>
                        <div class="answer-editor">
                            <textarea id="fill-blank-full-text" class="form-input" style="min-height: 150px;" placeholder="输入完整文本，选中文字后点击"挖空"按钮创建填空...&#10;例如：中国的首都是[北京#首都#]" oninput="updateFillPreview()"></textarea>
                        </div>
                    </div>
                </div>

                <div class="create-section" style="margin-top: 1rem;">
                    <div class="section-header">
                        <h2>预览</h2>
                    </div>
                    <div class="section-body" style="padding: 0;">
                        <div id="fill-blank-preview" class="fill-preview">
                            预览内容将在此显示...
                        </div>
                    </div>
                </div>
            </div>

            <!-- 操作按钮区 -->
            <div class="action-bar">
                <div class="action-secondary">
                    <button type="button" class="btn-text" onclick="showImportModal()">导入 JSON</button>
                </div>
                <button type="button" id="save-btn" class="btn" onclick="saveQuiz()">保存测验</button>
            </div>

    </form>

    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/track.js"></script>
    <script>
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const editQuizId = urlParams.get('id');
        let currentQuizData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }
            
            // 加载分组选项
            try {
                const groups = await fetch('/api/groups', { headers: Auth.getAuthHeaders() }).then(res => res.json());
                const select = document.getElementById('quiz-group-select');
                groups.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('加载分组失败'); }
            
            // 如果是编辑模式，加载测验数据
            if (editQuizId) {
                await loadQuizForEditing(editQuizId);
            }
        });

        // 加载测验数据用于编辑
        async function loadQuizForEditing(id) {
            try {
                const res = await fetch(`/api/quizzes/${id}`, { headers: Auth.getAuthHeaders() });
                if (!res.ok) {
                    alert('加载测验失败');
                    return;
                }
                
                const quiz = await res.json();
                currentQuizData = quiz;
                
                // 更新页面标题
                document.getElementById('page-title').textContent = '编辑测验';
                document.getElementById('save-btn').textContent = '更新测验';
                document.title = '编辑测验 - 敲脑壳 MindPop';
                
                // 填充表单数据
                document.getElementById('quiz-title').value = quiz.title || '';
                document.getElementById('quiz-description').value = quiz.description || '';
                document.getElementById('quiz-time-limit').value = quiz.timeLimit || '';
                
                // 设置测验类型
                const typeRadio = document.querySelector(`input[name="quiz-type"][value="${quiz.quizType}"]`);
                if (typeRadio) {
                    typeRadio.checked = true;
                    toggleTypeFields();
                }
                
                // 设置分组
                if (quiz.groups && quiz.groups.length > 0) {
                    document.getElementById('quiz-group-select').value = quiz.groups[0].id;
                }
                if (quiz.quizType === 'TYPING' && quiz.answerList) {
                    // 将答案数组转换为文本格式
                    const answersText = quiz.answerList.map(a => {
                        return a.comment ? `${a.content}#${a.comment}#` : a.content;
                    }).join('\n');
                    document.getElementById('quiz-answers').value = answersText;
                } else if (quiz.quizType === 'FILL_BLANK' && quiz.fillBlankQuiz) {
                    // 根据 blanks 数组重建正确的 fullText 格式（修复已有错误数据）
                    const reconstructedText = reconstructFullTextFromBlanks(
                        quiz.fillBlankQuiz.blanks, 
                        quiz.fillBlankQuiz.fullText
                    );
                    document.getElementById('fill-blank-full-text').value = reconstructedText;
                    updateFillPreview();
                }
                
            } catch (e) {
                console.error('加载测验失败:', e);
                alert('加载测验失败');
            }
        }

        function toggleTypeFields() {
            const type = document.querySelector('input[name="quiz-type"]:checked').value;
            const typingFields = document.getElementById('typing-fields');
            const fillBlankFields = document.getElementById('fill-blank-fields');
            
            if (type === 'TYPING') {
                typingFields.classList.add('active');
                fillBlankFields.classList.remove('active');
            } else {
                typingFields.classList.remove('active');
                fillBlankFields.classList.add('active');
            }
        }

        // 修复填空题格式，将 ## 替换为 #，保留原文内容
        function reconstructFullTextFromBlanks(blanks, originalFullText) {
            if (!originalFullText) return '';
            
            // 简单替换：将 ## 替换为 #，但保留内容
            // 例如：[您的用户的需求##"​。对这个...##] → [您的用户的需求#"​。对这个...#]
            let result = originalFullText;
            
            // 将所有的 ## 替换为 #（但保留中间的内容）
            // 使用正则匹配 [xxx##yyy##] 格式，替换为 [xxx#yyy#]
            result = result.replace(/\[([^\]]*)##([^#]*)##\]/g, '[$1#$2#]');
            
            // 处理单个 ##（未闭合的情况）
            result = result.replace(/##/g, '#');
            
            return result;
        }

        function insertCommentSymbol(id) {
            const el = document.getElementById(id);
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            el.value = text.slice(0, start) + '#' + text.slice(end);
            el.focus();
            el.setSelectionRange(start + 1, start + 1);
        }

        function wrapSelectionWithBrackets() {
            const el = document.getElementById('fill-blank-full-text');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            if (start === end) return;
            const selected = text.slice(start, end);
            el.value = text.slice(0, start) + '[' + selected + ']' + text.slice(end);
            updateFillPreview();
        }

        function wrapSelectionWithHash(elementId) {
            const el = document.getElementById(elementId);
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            if (start === end) return;
            
            const selected = text.slice(start, end);
            const before = text.slice(0, start);
            const after = text.slice(end);
            
            // 检查选中的文本是否已包含 # 格式
            if (selected.includes('#')) {
                // 已包含 #，不再添加（避免重复）
                return;
            }
            
            // 检查是否在方括号内
            const lastOpenBracket = before.lastIndexOf('[');
            const lastCloseBracket = before.lastIndexOf(']');
            const nextCloseBracket = after.indexOf(']');
            const nextOpenBracket = after.indexOf('[');
            
            // 如果在方括号内（[ 之后且在 ] 之前）
            if (lastOpenBracket > lastCloseBracket && nextCloseBracket !== -1) {
                // 在方括号内，直接在选中文本后添加 #注释#
                // 格式：[选中文本#注释#]
                const commentPlaceholder = '#注释#';
                el.value = before + selected + commentPlaceholder + after;
                el.focus();
                // 选中"注释"两个字，方便用户直接输入替换
                const commentStart = start + selected.length + 1;
                el.setSelectionRange(commentStart, commentStart + 2);
                updateFillPreview();
                return;
            }
            
            // 如果选中的是完整的 [答案]（包含方括号）
            if (selected.startsWith('[') && selected.endsWith(']')) {
                // 在方括号内添加注释
                const innerContent = selected.slice(1, -1);
                const commentPlaceholder = '#注释#';
                el.value = before + '[' + innerContent + commentPlaceholder + after;
                el.focus();
                const commentStart = start + innerContent.length + 2;
                el.setSelectionRange(commentStart, commentStart + 2);
                updateFillPreview();
                return;
            }
            
            // 默认情况：简单地在选中文本前后添加 #（用于普通文本添加注释标记）
            el.value = before + '#' + selected + '#' + after;
            el.focus();
            el.setSelectionRange(end + 2, end + 2);
        }

        function updateFillPreview() {
            const text = document.getElementById('fill-blank-full-text').value;
            const preview = document.getElementById('fill-blank-preview');
            
            if (!text.trim()) {
                preview.innerHTML = '预览内容将在此显示...';
                preview.style.color = 'var(--text-muted)';
                return;
            }
            
            preview.style.color = 'var(--text-main)';
            // 替换 [答案] 或 [答案#注释#] 为填空样式
            const html = text.replace(/\[([^\]]+)\]/g, function(match, content) {
                // 提取答案（去掉注释部分）
                let answer = content;
                if (content.endsWith('#')) {
                    const parts = content.split('#');
                    if (parts.length >= 3) {
                        answer = parts.slice(0, parts.length - 2).join('#');
                    }
                }
                return '<span class="blank-slot">' + answer + '</span>';
            });
            preview.innerHTML = html;
        }

        // 导入功能
        function showImportModal() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = handleFileImport;
            input.click();
        }

        async function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            try {
                const text = await file.text();
                const data = JSON.parse(text);
                
                const isArray = Array.isArray(data);
                const quizzes = isArray ? data : [data];
                
                for (const quiz of quizzes) {
                    if (!quiz.title || (!quiz.answers && !quiz.answerList)) {
                        alert('文件格式不正确,请确保包含title和answers字段');
                        return;
                    }
                }
                
                const response = await fetch('/api/import-export/quizzes/import', {
                    method: 'POST',
                    headers: Auth.getAuthHeaders(),
                    body: JSON.stringify(quizzes)
                });
                
                const result = await response.json();
                
                let message = `导入完成!\n成功: ${result.successCount} 个\n失败: ${result.failureCount} 个`;
                
                if (result.failures && result.failures.length > 0) {
                    message += '\n\n失败的测验:\n';
                    result.failures.forEach(f => {
                        message += `- ${f.title}: ${f.error}\n`;
                    });
                }
                
                alert(message);
                if (result.successCount > 0) {
                    window.location.href = 'manage.html';
                }
            } catch (error) {
                console.error('导入失败:', error);
                alert('导入失败: ' + error.message);
            }
        }

        // 解析打字题答案和注释（仅 #注释# 格式才识别为注释）
        function parseTypingAnswerWithComment(line) {
            let content = line.trim();
            let comment = null;
            
            // 检查是否包含至少两个 #，且以 # 结尾
            if (content.endsWith('#')) {
                const parts = content.split('#');
                // 格式应为 "内容#注释#"，分割后至少有 3 部分 (["内容", "注释", ""])
                if (parts.length >= 3) {
                    comment = parts[parts.length - 2].trim();
                    content = parts.slice(0, parts.length - 2).join('#').trim();
                }
            }
            
            return { content: content, comment: comment };
        }

        // 解析填空题文本，生成 blanks 数组
        function parseFillBlankText(fullText) {
            const blanks = [];
            // 支持 [答案] 或 [答案#注释#] 格式（单#包裹注释）
            const regex = /\[([^\]]+)\]/g;
            let match;
            let offset = 0;
            
            while ((match = regex.exec(fullText)) !== null) {
                const fullMatch = match[0]; // 例如: [北京#首都#]
                const content = match[1];   // 例如: 北京#首都#
                const startIndex = match.index - offset;
                
                // 解析正确答案和注释（仅 #注释# 格式才识别为注释）
                let correctAnswer = content.trim();
                let comment = null;
                
                // 检查是否以 # 结尾（单#注释格式）
                if (correctAnswer.endsWith('#')) {
                    const parts = correctAnswer.split('#');
                    if (parts.length >= 3) {
                        comment = parts[parts.length - 2].trim();
                        correctAnswer = parts.slice(0, parts.length - 2).join('#').trim();
                    }
                }
                
                blanks.push({
                    startIndex: startIndex,
                    endIndex: startIndex + correctAnswer.length,  // endIndex 是答案在纯文本中的结束位置（不含注释）
                    correctAnswer: correctAnswer,
                    comment: comment
                });
                
                // 更新偏移量（去掉标记括号后的长度变化）
                offset += fullMatch.length - correctAnswer.length;
            }
            
            return blanks;
        }

        async function saveQuiz() {
            const title = document.getElementById('quiz-title').value;
            if (!title) { alert('请输入标题'); return; }

            const type = document.querySelector('input[name="quiz-type"]:checked').value;
            const description = document.getElementById('quiz-description').value;
            const timeLimit = document.getElementById('quiz-time-limit').value;
            const groupId = document.getElementById('quiz-group-select').value;

            let quizData = {
                title,
                description,
                timeLimit: timeLimit ? parseInt(timeLimit) : null,
                quizType: type
            };

            if (type === 'TYPING') {
                const answersText = document.getElementById('quiz-answers').value;
                quizData.answerList = answersText
                    .split('\n')
                    .filter(line => line.trim())
                    .map(line => parseTypingAnswerWithComment(line));
            } else {
                const fullText = document.getElementById('fill-blank-full-text').value;
                const blanks = parseFillBlankText(fullText);
                
                if (blanks.length === 0) {
                    alert('请至少设置一个填空（使用[]标记需要填空的内容）');
                    return;
                }
                
                quizData.fillBlankQuiz = {
                    fullText: fullText,
                    blanks: blanks
                };
            }

            try {
                // 根据是否有editQuizId判断是创建还是更新
                const method = editQuizId ? 'PUT' : 'POST';
                const url = editQuizId ? `/api/quizzes/${editQuizId}` : '/api/quizzes';
                
                const response = await fetch(url, {
                    method,
                    headers: Auth.getAuthHeaders(),
                    body: JSON.stringify(quizData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    const savedQuizId = editQuizId || result.id;
                    
                    if (groupId) {
                        // 如果选了分组，关联到分组
                        await fetch(`/api/groups/${groupId}/quizzes/${savedQuizId}`, {
                            method: 'POST',
                            headers: Auth.getAuthHeaders()
                        });
                    }
                    alert(editQuizId ? '更新成功' : '保存成功');
                    window.location.href = 'manage.html';
                } else {
                    alert(editQuizId ? '更新失败' : '保存失败');
                }
            } catch (e) { 
                alert(editQuizId ? '更新失败' : '保存失败'); 
            }
        }
    </script>
