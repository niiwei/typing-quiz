        /* еҚЎзүҮеҢәеқ— - з»ҹдёҖиҫ№жЎҶйЈҺж ј */

            border: 1px solid var(--border);

        .section-header {
            padding: 1rem 1.5rem;

        /* иЎЁеҚ•е…ғзҙ еҹәзЎҖж ·ејҸ */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {

        .form-label {

    <script>
        // иҺ·еҸ–URLеҸӮж•°
        const urlParams = new URLSearchParams(window.location.search);
        const editQuizId = urlParams.get('id');
        let currentQuizData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }
            
            // еҠ иҪҪеҲҶз»„йҖүйЎ№
            try {
                const groups = await fetch('/api/groups', { headers: Auth.getAuthHeaders() }).then(res => res.json());
                const select = document.getElementById('quiz-group-select');
                groups.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('еҠ иҪҪеҲҶз»„еӨұиҙҘ'); }
            
            // еҰӮжһңжҳҜзј–иҫ‘жЁЎејҸпјҢеҠ иҪҪжөӢйӘҢж•°жҚ®
            if (editQuizId) {
                await loadQuizForEditing(editQuizId);
            }
        });

        // еҠ иҪҪжөӢйӘҢж•°жҚ®з”ЁдәҺзј–иҫ‘
        async function loadQuizForEditing(id) {
            try {
                const res = await fetch(`/api/quizzes/${id}`, { headers: Auth.getAuthHeaders() });
                if (!res.ok) {
                    alert('еҠ иҪҪжөӢйӘҢеӨұиҙҘ');
                    return;
                }
                
                const quiz = await res.json();
                currentQuizData = quiz;
                
                // жӣҙж–°йЎөйқўж Үйўҳ
                document.getElementById('page-title').textContent = 'зј–иҫ‘жөӢйӘҢ';
                document.getElementById('save-btn').textContent = 'жӣҙж–°жөӢйӘҢ';
                document.title = 'зј–иҫ‘жөӢйӘҢ - ж•Іи„‘еЈі MindPop';
                
                // еЎ«е……иЎЁеҚ•ж•°жҚ®
                document.getElementById('quiz-title').value = quiz.title || '';
                document.getElementById('quiz-description').value = quiz.description || '';
                document.getElementById('quiz-time-limit').value = quiz.timeLimit || '';
                
                // и®ҫзҪ®жөӢйӘҢзұ»еһӢ
                const typeRadio = document.querySelector(`input[name="quiz-type"][value="${quiz.quizType}"]`);
                if (typeRadio) {
                    typeRadio.checked = true;
                    toggleTypeFields();
                }
                
                // и®ҫзҪ®еҲҶз»„
                if (quiz.groups && quiz.groups.length > 0) {
                    document.getElementById('quiz-group-select').value = quiz.groups[0].id;
                }
                if (quiz.quizType === 'TYPING' && quiz.answerList) {
                    // е°Ҷзӯ”жЎҲж•°з»„иҪ¬жҚўдёәж–Үжң¬ж јејҸ
                    const answersText = quiz.answerList.map(a => {
                        return a.comment ? `${a.content}#${a.comment}#` : a.content;
                    }).join('\n');
                    document.getElementById('quiz-answers').value = answersText;
                } else if (quiz.quizType === 'FILL_BLANK' && quiz.fillBlankQuiz) {
                    // ж №жҚ® blanks ж•°з»„йҮҚе»әжӯЈзЎ®зҡ„ fullText ж јејҸпјҲдҝ®еӨҚе·Іжңүй”ҷиҜҜж•°жҚ®пјү
                    const reconstructedText = reconstructFullTextFromBlanks(
                        quiz.fillBlankQuiz.blanks, 
                        quiz.fillBlankQuiz.fullText
                    );
                    document.getElementById('fill-blank-full-text').value = reconstructedText;
                    updateFillPreview();
                }
                
            } catch (e) {
                console.error('еҠ иҪҪжөӢйӘҢеӨұиҙҘ:', e);
                alert('еҠ иҪҪжөӢйӘҢеӨұиҙҘ');
            }
        }

        function toggleTypeFields() {
            const type = document.querySelector('input[name="quiz-type"]:checked').value;
            const typingFields = document.getElementById('typing-fields');
            const fillBlankFields = document.getElementById('fill-blank-fields');
            
            if (type === 'TYPING') {
                typingFields.classList.add('active');
                fillBlankFields.classList.remove('active');
            } else {
                typingFields.classList.remove('active');
                fillBlankFields.classList.add('active');
            }
        }

        // дҝ®еӨҚеЎ«з©әйўҳж јејҸпјҢе°Ҷ ## жӣҝжҚўдёә #пјҢдҝқз•ҷеҺҹж–ҮеҶ…е®№
        function reconstructFullTextFromBlanks(blanks, originalFullText) {
            if (!originalFullText) return '';
            
            // з®ҖеҚ•жӣҝжҚўпјҡе°Ҷ ## жӣҝжҚўдёә #пјҢдҪҶдҝқз•ҷеҶ…е®№
            // дҫӢеҰӮпјҡ[жӮЁзҡ„з”ЁжҲ·зҡ„йңҖжұӮ##"вҖӢгҖӮеҜ№иҝҷдёӘ...##] вҶ’ [жӮЁзҡ„з”ЁжҲ·зҡ„йңҖжұӮ#"вҖӢгҖӮеҜ№иҝҷдёӘ...#]
            let result = originalFullText;
            
            // е°ҶжүҖжңүзҡ„ ## жӣҝжҚўдёә #пјҲдҪҶдҝқз•ҷдёӯй—ҙзҡ„еҶ…е®№пјү
            // дҪҝз”ЁжӯЈеҲҷеҢ№й…Қ [xxx##yyy##] ж јејҸпјҢжӣҝжҚўдёә [xxx#yyy#]
            result = result.replace(/\[([^\]]*)##([^#]*)##\]/g, '[$1#$2#]');
            
            // еӨ„зҗҶеҚ•дёӘ ##пјҲжңӘй—ӯеҗҲзҡ„жғ…еҶөпјү
            result = result.replace(/##/g, '#');
            
            return result;
        }

        function insertCommentSymbol(id) {
            const el = document.getElementById(id);
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            el.value = text.slice(0, start) + '#' + text.slice(end);
            el.focus();
            el.setSelectionRange(start + 1, start + 1);
        }

        function wrapSelectionWithBrackets() {
            const el = document.getElementById('fill-blank-full-text');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            if (start === end) return;
            const selected = text.slice(start, end);
            el.value = text.slice(0, start) + '[' + selected + ']' + text.slice(end);
            updateFillPreview();
        }

        function wrapSelectionWithHash(elementId) {
            const el = document.getElementById(elementId);
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            if (start === end) return;
            
            const selected = text.slice(start, end);
            const before = text.slice(0, start);
            const after = text.slice(end);
            
            // жЈҖжҹҘйҖүдёӯзҡ„ж–Үжң¬жҳҜеҗҰе·ІеҢ…еҗ« # ж јејҸ
            if (selected.includes('#')) {
                // е·ІеҢ…еҗ« #пјҢдёҚеҶҚж·»еҠ пјҲйҒҝе…ҚйҮҚеӨҚпјү
                return;
            }
            
            // жЈҖжҹҘжҳҜеҗҰеңЁж–№жӢ¬еҸ·еҶ…
            const lastOpenBracket = before.lastIndexOf('[');
            const lastCloseBracket = before.lastIndexOf(']');
            const nextCloseBracket = after.indexOf(']');
            const nextOpenBracket = after.indexOf('[');
            
            // еҰӮжһңеңЁж–№жӢ¬еҸ·еҶ…пјҲ[ д№ӢеҗҺдё”еңЁ ] д№ӢеүҚпјү
            if (lastOpenBracket > lastCloseBracket && nextCloseBracket !== -1) {
                // еңЁж–№жӢ¬еҸ·еҶ…пјҢзӣҙжҺҘеңЁйҖүдёӯж–Үжң¬еҗҺж·»еҠ  #жіЁйҮҠ#
                // ж јејҸпјҡ[йҖүдёӯж–Үжң¬#жіЁйҮҠ#]
                const commentPlaceholder = '#жіЁйҮҠ#';
                el.value = before + selected + commentPlaceholder + after;
                el.focus();
                // йҖүдёӯ"жіЁйҮҠ"дёӨдёӘеӯ—пјҢж–№дҫҝз”ЁжҲ·зӣҙжҺҘиҫ“е…ҘжӣҝжҚў
                const commentStart = start + selected.length + 1;
                el.setSelectionRange(commentStart, commentStart + 2);
                updateFillPreview();
                return;
            }
            
            // еҰӮжһңйҖүдёӯзҡ„жҳҜе®Ңж•ҙзҡ„ [зӯ”жЎҲ]пјҲеҢ…еҗ«ж–№жӢ¬еҸ·пјү
            if (selected.startsWith('[') && selected.endsWith(']')) {
                // еңЁж–№жӢ¬еҸ·еҶ…ж·»еҠ жіЁйҮҠ
                const innerContent = selected.slice(1, -1);
                const commentPlaceholder = '#жіЁйҮҠ#';
                el.value = before + '[' + innerContent + commentPlaceholder + after;
                el.focus();
                const commentStart = start + innerContent.length + 2;
                el.setSelectionRange(commentStart, commentStart + 2);
                updateFillPreview();
                return;
            }
            
            // й»ҳи®Өжғ…еҶөпјҡз®ҖеҚ•ең°еңЁйҖүдёӯж–Үжң¬еүҚеҗҺж·»еҠ  #пјҲз”ЁдәҺжҷ®йҖҡж–Үжң¬ж·»еҠ жіЁйҮҠж Үи®°пјү
            el.value = before + '#' + selected + '#' + after;
            el.focus();
            el.setSelectionRange(end + 2, end + 2);
        }

        function updateFillPreview() {
            const text = document.getElementById('fill-blank-full-text').value;
            const preview = document.getElementById('fill-blank-preview');
            
            if (!text.trim()) {
                preview.innerHTML = 'йў„и§ҲеҶ…е®№е°ҶеңЁжӯӨжҳҫзӨә...';
                preview.style.color = 'var(--text-muted)';
                return;
            }
            
            preview.style.color = 'var(--text-main)';
            // жӣҝжҚў [зӯ”жЎҲ] жҲ– [зӯ”жЎҲ#жіЁйҮҠ#] дёәеЎ«з©әж ·ејҸ
            const html = text.replace(/\[([^\]]+)\]/g, function(match, content) {
                // жҸҗеҸ–зӯ”жЎҲпјҲеҺ»жҺүжіЁйҮҠйғЁеҲҶпјү
                let answer = content;
                if (content.endsWith('#')) {
                    const parts = content.split('#');
                    if (parts.length >= 3) {
                        answer = parts.slice(0, parts.length - 2).join('#');
                    }
                }
                return '<span class="blank-slot">' + answer + '</span>';
            });
            preview.innerHTML = html;
        }

        // еҜје…ҘеҠҹиғҪ
        function showImportModal() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = handleFileImport;
            input.click();
        }

        async function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            try {
                const text = await file.text();
                const data = JSON.parse(text);
                
                const isArray = Array.isArray(data);
                const quizzes = isArray ? data : [data];
                
                for (const quiz of quizzes) {
                    if (!quiz.title || (!quiz.answers && !quiz.answerList)) {
                        alert('ж–Үд»¶ж јејҸдёҚжӯЈзЎ®,иҜ·зЎ®дҝқеҢ…еҗ«titleе’Ңanswersеӯ—ж®ө');
                        return;
                    }
                }
                
                const response = await fetch('/api/import-export/quizzes/import', {
                    method: 'POST',
                    headers: Auth.getAuthHeaders(),
                    body: JSON.stringify(quizzes)
                });
                
                const result = await response.json();
                
                let message = `еҜје…Ҙе®ҢжҲҗ!\nжҲҗеҠҹ: ${result.successCount} дёӘ\nеӨұиҙҘ: ${result.failureCount} дёӘ`;
                
                if (result.failures && result.failures.length > 0) {
                    message += '\n\nеӨұиҙҘзҡ„жөӢйӘҢ:\n';
                    result.failures.forEach(f => {
                        message += `- ${f.title}: ${f.error}\n`;
                    });
                }
                
                alert(message);
                if (result.successCount > 0) {
                    window.location.href = 'manage.html';
                }
            } catch (error) {
                console.error('еҜје…ҘеӨұиҙҘ:', error);
                alert('еҜје…ҘеӨұиҙҘ: ' + error.message);
            }
        }

        // и§Јжһҗжү“еӯ—йўҳзӯ”жЎҲе’ҢжіЁйҮҠпјҲд»… #жіЁйҮҠ# ж јејҸжүҚиҜҶеҲ«дёәжіЁйҮҠпјү
        function parseTypingAnswerWithComment(line) {
            let content = line.trim();
            let comment = null;
            
            // жЈҖжҹҘжҳҜеҗҰеҢ…еҗ«иҮіе°‘дёӨдёӘ #пјҢдё”д»Ҙ # з»“е°ҫ
            if (content.endsWith('#')) {
                const parts = content.split('#');
                // ж јејҸеә”дёә "еҶ…е®№#жіЁйҮҠ#"пјҢеҲҶеүІеҗҺиҮіе°‘жңү 3 йғЁеҲҶ (["еҶ…е®№", "жіЁйҮҠ", ""])
                if (parts.length >= 3) {
                    comment = parts[parts.length - 2].trim();
                    content = parts.slice(0, parts.length - 2).join('#').trim();
                }
            }
            
            return { content: content, comment: comment };
        }

        // и§ЈжһҗеЎ«з©әйўҳж–Үжң¬пјҢз”ҹжҲҗ blanks ж•°з»„
        function parseFillBlankText(fullText) {
            const blanks = [];
            // ж”ҜжҢҒ [зӯ”жЎҲ] жҲ– [зӯ”жЎҲ#жіЁйҮҠ#] ж јејҸпјҲеҚ•#еҢ…иЈ№жіЁйҮҠпјү
            const regex = /\[([^\]]+)\]/g;
            let match;
            let offset = 0;
            
            while ((match = regex.exec(fullText)) !== null) {
                const fullMatch = match[0]; // дҫӢеҰӮ: [еҢ—дә¬#йҰ–йғҪ#]
                const content = match[1];   // дҫӢеҰӮ: еҢ—дә¬#йҰ–йғҪ#
                const startIndex = match.index - offset;
                
                // и§ЈжһҗжӯЈзЎ®зӯ”жЎҲе’ҢжіЁйҮҠпјҲд»… #жіЁйҮҠ# ж јејҸжүҚиҜҶеҲ«дёәжіЁйҮҠпјү
                let correctAnswer = content.trim();
                let comment = null;
                
                // жЈҖжҹҘжҳҜеҗҰд»Ҙ # з»“е°ҫпјҲеҚ•#жіЁйҮҠж јејҸпјү
                if (correctAnswer.endsWith('#')) {
                    const parts = correctAnswer.split('#');
                    if (parts.length >= 3) {
                        comment = parts[parts.length - 2].trim();
                        correctAnswer = parts.slice(0, parts.length - 2).join('#').trim();
                    }
                }
                
                blanks.push({
                    startIndex: startIndex,
                    endIndex: startIndex + correctAnswer.length,  // endIndex жҳҜзӯ”жЎҲеңЁзәҜж–Үжң¬дёӯзҡ„з»“жқҹдҪҚзҪ®пјҲдёҚеҗ«жіЁйҮҠпјү
                    correctAnswer: correctAnswer,
                    comment: comment
                });
                
                // жӣҙж–°еҒҸз§»йҮҸпјҲеҺ»жҺүж Үи®°жӢ¬еҸ·еҗҺзҡ„й•ҝеәҰеҸҳеҢ–пјү
                offset += fullMatch.length - correctAnswer.length;
            }
            
            return blanks;
        }

        async function saveQuiz() {
            const title = document.getElementById('quiz-title').value;
            if (!title) { alert('иҜ·иҫ“е…Ҙж Үйўҳ'); return; }

            const type = document.querySelector('input[name="quiz-type"]:checked').value;
            const description = document.getElementById('quiz-description').value;
            const timeLimit = document.getElementById('quiz-time-limit').value;
            const groupId = document.getElementById('quiz-group-select').value;

            let quizData = {
                title,
                description,
                timeLimit: timeLimit ? parseInt(timeLimit) : null,
                quizType: type
            };

            if (type === 'TYPING') {
                const answersText = document.getElementById('quiz-answers').value;
                quizData.answerList = answersText
                    .split('\n')
                    .filter(line => line.trim())
                    .map(line => parseTypingAnswerWithComment(line));
            } else {
                const fullText = document.getElementById('fill-blank-full-text').value;
                const blanks = parseFillBlankText(fullText);
                
                if (blanks.length === 0) {
                    alert('иҜ·иҮіе°‘и®ҫзҪ®дёҖдёӘеЎ«з©әпјҲдҪҝз”Ё[]ж Үи®°йңҖиҰҒеЎ«з©әзҡ„еҶ…е®№пјү');
                    return;
                }
                
                quizData.fillBlankQuiz = {
                    fullText: fullText,
                    blanks: blanks
                };
            }

            try {
                // ж №жҚ®жҳҜеҗҰжңүeditQuizIdеҲӨж–ӯжҳҜеҲӣе»әиҝҳжҳҜжӣҙж–°
                const method = editQuizId ? 'PUT' : 'POST';
                const url = editQuizId ? `/api/quizzes/${editQuizId}` : '/api/quizzes';
                
                const response = await fetch(url, {
                    method,
                    headers: Auth.getAuthHeaders(),
                    body: JSON.stringify(quizData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    const savedQuizId = editQuizId || result.id;
                    
                    if (groupId) {
                        // еҰӮжһңйҖүдәҶеҲҶз»„пјҢе…іиҒ”еҲ°еҲҶз»„
                        await fetch(`/api/groups/${groupId}/quizzes/${savedQuizId}`, {
                            method: 'POST',
                            headers: Auth.getAuthHeaders()
                        });
                    }
                    alert(editQuizId ? 'жӣҙж–°жҲҗеҠҹ' : 'дҝқеӯҳжҲҗеҠҹ');
                    window.location.href = 'manage.html';
                } else {
                    alert(editQuizId ? 'жӣҙж–°еӨұиҙҘ' : 'дҝқеӯҳеӨұиҙҘ');
                }
            } catch (e) { 
                alert(editQuizId ? 'жӣҙж–°еӨұиҙҘ' : 'дҝқеӯҳеӨұиҙҘ'); 
            }
        }

        function showAiGenerateModal() {
            document.getElementById('ai-generate-modal').style.display = 'flex';
            document.getElementById('ai-error').style.display = 'none';
            document.getElementById('ai-loading').style.display = 'none';
            document.getElementById('ai-note-input').value = '';
            document.getElementById('ai-book-name').value = '';
        }

        function closeAiModal() {
            document.getElementById('ai-generate-modal').style.display = 'none';
        }

        async function generateFillBlankWithAi() {
            const noteContent = document.getElementById('ai-note-input').value.trim();
            if (!noteContent) {
                showAiError('иҜ·иҫ“е…Ҙз¬”и®°еҶ…е®№');
                return;
            }

            const bookName = document.getElementById('ai-book-name').value.trim();

            document.getElementById('ai-error').style.display = 'none';
            document.getElementById('ai-loading').style.display = 'block';
            document.getElementById('ai-generate-btn').disabled = true;

            try {
                const response = await fetch('/api/ai/generate-fill-blank', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...Auth.getAuthHeaders()
                    },
                    body: JSON.stringify({ noteContent, bookName })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'з”ҹжҲҗеӨұиҙҘ');
                }

                applyAiGeneratedFillBlank(data);
                closeAiModal();
                document.getElementById('fill-blank-full-text').value = data.fullText;
                updateFillPreview();
                
            } catch (error) {
                showAiError(error.message);
            } finally {
                document.getElementById('ai-loading').style.display = 'none';
                document.getElementById('ai-generate-btn').disabled = false;
            }
        }

        function showAiError(message) {
            const errorEl = document.getElementById('ai-error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function applyAiGeneratedFillBlank(data) {
            if (data.title) {
                document.getElementById('quiz-title').value = data.title;
            }
            if (data.groups && data.groups.length > 0) {
                const select = document.getElementById('quiz-group-select');
                for (let option of select.options) {
                    if (option.textContent === data.groups[0]) {
                        option.selected = true;
                        break;
                    }
                }
            }
        }
