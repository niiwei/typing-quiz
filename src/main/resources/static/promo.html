<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学间隔复习 - 敲脑壳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 50%, #fffde7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .promo-card {
            width: 375px;
            height: 500px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 25px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .promo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #81c784 0%, #a5d6a7 50%, #c8e6c9 100%);
            z-index: 10;
        }

        .screenshot-section {
            height: 220px;
            background: linear-gradient(180deg, #fafafa 0%, #f5f5f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #eeeeee;
            position: relative;
            overflow: hidden;
        }

        .screenshot-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screenshot-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .content-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 32px 20px;
        }

        .icon-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .icon-wrapper {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #81c784 0%, #66bb6a 100%);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(129, 199, 132, 0.3);
        }

        .icon-wrapper svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .feature-title {
            font-size: 14px;
            font-weight: 600;
            color: #2e7d32;
            letter-spacing: 0.5px;
        }

        .feature-text {
            font-size: 17px;
            font-weight: 500;
            color: #424242;
            line-height: 1.7;
            text-align: center;
            margin-bottom: 20px;
        }

        .algorithm-badge {
            display: inline-flex;
            align-items: center;
            background: #f1f8e9;
            border: 1px solid #c8e6c9;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: #558b2f;
            font-weight: 500;
        }

        .algorithm-badge::before {
            content: '✓';
            width: 16px;
            height: 16px;
            background: #81c784;
            border-radius: 50%;
            color: #ffffff;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 6px;
        }

        .brand {
            margin-top: 16px;
            font-size: 11px;
            color: #9e9e9e;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="promo-card">
        <div class="screenshot-section">
            <div class="screenshot-wrapper">
                <img src="/images/app-screenshot.png" alt="敲脑壳应用首页截图">
            </div>
        </div>
        
        <div class="content-section">
            <div class="icon-row">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </div>
                <span class="feature-title">核心功能</span>
            </div>
            
            <div class="feature-text">
                科学间隔复习，内置 SM-2 算法<br>
                基于遗忘曲线自动规划任务
            </div>
            
            <div class="algorithm-badge">SM-2 Algorithm</div>
            
            <div class="brand">敲脑壳 MindPop</div>
        </div>
    </div>
</body>
</html>
