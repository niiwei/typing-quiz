<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Quiz - 打字测验</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="navbar-brand">Typing Quiz</a>
        <div class="navbar-nav">
            <a href="home.html" class="nav-link">首页</a>
            <a href="quizzes.html" class="nav-link">测验</a>
            <a href="create.html" class="nav-link">创建</a>
            <a href="manage.html" class="nav-link">管理</a>
            <div id="userSection" style="display: none; margin-left: 1rem;">
                <button onclick="Auth.logout()" class="btn btn-small" style="padding: 0.2rem 0.5rem; border-color: var(--error); color: var(--error);">退出</button>
            </div>
        </div>
    </nav>

    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

    <div id="quiz-container">
        <!-- 测验信息 -->
        <div id="quiz-header">
            <h1 id="quiz-title">加载中...</h1>
            <div id="quiz-stats">
                <span id="time-display">--:--</span>
                <span id="score-display" style="font-size: 0.8rem; color: var(--text-muted); margin-left: 1rem;">0/0</span>
            </div>
            <p id="quiz-description" style="margin-top: 1rem;"></p>
        </div>

        <!-- 输入区域 -->
        <div id="input-section">
            <input type="text" 
                   id="answer-input" 
                   placeholder="在此输入..." 
                   autocomplete="off"
                   spellcheck="false" />
            <div id="feedback-message" style="font-size: 0.7rem; height: 1rem; margin-top: 0.5rem;"></div>
            <button id="give-up-btn" class="btn btn-small give-up-btn" onclick="giveUp()">放弃并结算</button>
        </div>

        <!-- 答案网格 -->
        <div id="answers-grid">
            <!-- 动态生成答案格子 -->
        </div>

        <!-- 填空题显示区 -->
        <div id="fill-blank-section" style="display: none;">
            <div id="fill-blank-question" class="fill-blank-question"></div>
            <div id="fill-blank-text" class="fill-blank-text"></div>
        </div>

        <!-- 结果面板 -->
        <div id="results-panel" style="display: none;">
            <h2 style="font-weight: 200; font-size: 3rem; margin-bottom: 1rem;">测验完成</h2>
            <div class="home-stats">
                <div class="stat-box">
                    <span class="stat-num" id="final-accuracy">0%</span>
                    <span class="stat-label">准确率</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="final-score">0</span>
                    <span class="stat-label">得分</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="final-time">00:00</span>
                    <span class="stat-label">总用时</span>
                </div>
            </div>
            <div id="missed-answers-section" style="text-align: left; margin: 3rem 0;">
                <h3 style="font-size: 0.7rem; letter-spacing: 0.1em; color: var(--error); margin-bottom: 1rem; text-transform: uppercase;">未答出项</h3>
                <div id="missed-answers" class="answers-grid"></div>
            </div>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="restart-btn" class="btn">重新开始</button>
                <a href="quizzes.html" class="btn" style="border-color: var(--text-muted); color: var(--text-muted);">返回列表</a>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=20260216-9"></script>
    <script src="js/review-api.js?v=20260216-9"></script>
    <script src="js/timer.js?v=20260216-9"></script>
    <script src="js/ui-renderer.js?v=20260216-9"></script>
    <script src="js/quiz-controller.js?v=20260216-9"></script>
    <script src="js/main.js?v=20260216-9"></script>

    <!-- 复习评级面板 - 仅复习模式显示 -->
    <div id="rating-panel" class="rating-panel" style="display: none;">
        <div style="text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em;">根据记忆程度选择评级 (1-4)</div>
        <div style="display: flex; justify-content: center; gap: 1rem;">
            <div class="rating-btn rating-again" onclick="submitRating(1)">
                <span>重来</span>
                <span class="interval">&lt;10分钟</span>
            </div>
            <div class="rating-btn rating-hard" onclick="submitRating(2)">
                <span>困难</span>
                <span class="interval">10分钟</span>
            </div>
            <div class="rating-btn rating-good" onclick="submitRating(3)">
                <span>良好</span>
                <span class="interval">1天</span>
            </div>
            <div class="rating-btn rating-easy" onclick="submitRating(4)">
                <span>简单</span>
                <span class="interval">4天</span>
            </div>
        </div>
    </div>

    <!-- 复习完成弹窗 -->
    <div id="review-completion-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); z-index: 200; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
        <div style="text-align: center; max-width: 400px; animation: fadeIn 0.4s ease-out;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✨</div>
            <h3 style="font-weight: 200; font-size: 2rem; color: var(--text-main); margin-bottom: 0.5rem;">复习完成</h3>
            <p id="review-completion-message" style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">今日复习任务已全部完成</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button onclick="returnToHome()" class="btn">返回首页</button>
                <button onclick="continueReview()" class="btn" style="border-color: var(--text-muted); color: var(--text-muted);">继续复习</button>
            </div>
        </div>
    </div>

    <script>
        // 复习模式相关变量
        let isReviewMode = false;
        let currentQuizStatus = null;

        // 检查是否是复习模式
        function checkReviewMode() {
            const params = new URLSearchParams(window.location.search);
            isReviewMode = params.get('mode') === 'review';
            if (isReviewMode) {
                document.body.classList.add('review-mode');
                loadQuizStatus();
            }
        }

        // 加载测验状态
        async function loadQuizStatus() {
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            if (!quizId || !isReviewMode) return;
            
            try {
                const status = await ReviewAPI.getQuizStatus(quizId);
                currentQuizStatus = status;
                updateRatingIntervals(status);
            } catch (error) {
                console.error('加载测验状态失败:', error);
            }
        }

        // 更新评级按钮间隔显示
        function updateRatingIntervals(status) {
            const intervals = calculateIntervals(status);
            document.querySelector('.rating-again span').textContent = intervals[1];
            document.querySelector('.rating-hard span').textContent = intervals[2];
            document.querySelector('.rating-good span').textContent = intervals[3];
            document.querySelector('.rating-easy span').textContent = intervals[4];
        }

        // 计算间隔
        function calculateIntervals(status) {
            const status_type = status.status;
            const ease = status.easeFactor || 2500;
            const currentInterval = status.intervalDays || 0;
            const learningStep = status.learningStep || 0;
            const MAX_INTERVAL = 365;

            let intervals = {};

            if (status_type === 'NEW' || status_type === 'LEARNING' || status_type === 'RELEARNING') {
                if (learningStep === 0) {
                    intervals = { 1: '<10分钟', 2: '<10分钟', 3: '10分钟', 4: '1天' };
                } else if (learningStep === 1) {
                    intervals = { 1: '<10分钟', 2: '10分钟', 3: '1小时', 4: '1天' };
                } else {
                    intervals = { 1: '<10分钟', 2: '1小时', 3: '1天', 4: '4天' };
                }
            } else {
                intervals[1] = '<10分钟';
                intervals[2] = formatInterval(Math.min(MAX_INTERVAL, Math.max(1, Math.round(currentInterval * 1.2))));
                intervals[3] = formatInterval(Math.min(MAX_INTERVAL, Math.max(1, Math.round(currentInterval * ease / 1000))));
                intervals[4] = formatInterval(Math.min(MAX_INTERVAL, Math.max(1, Math.round(currentInterval * ease / 1000 * 1.3))));
            }

            return intervals;
        }

        function formatInterval(days) {
            if (days < 1) {
                const hours = Math.round(days * 24);
                if (hours < 1) return '<1小时';
                return `${hours}小时`;
            }
            return days === 1 ? '1天' : `${days}天`;
        }

        // 显示评级面板
        function showRatingPanel() {
            if (!isReviewMode) return;
            // 更新评级按钮上的间隔时间
            if (currentQuizStatus) {
                updateRatingIntervals(currentQuizStatus);
            }
            document.getElementById('rating-panel').style.display = 'block';
        }

        // 提交评级
        async function submitRating(rating) {
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const groupId = params.get('groupId');
            if (!quizId) return;

            try {
                const status = currentQuizStatus?.status;
                console.log('提交评级 - 当前状态:', status, '分组:', groupId);
                let result;

                if (status === 'NEW' || status === 'LEARNING' || status === 'RELEARNING') {
                    result = await ReviewAPI.submitLearnRating(quizId, rating, groupId);
                } else {
                    result = await ReviewAPI.submitReviewRating(quizId, rating, groupId);
                }
                console.log('评级结果:', result);

                if (result.nextQuizId) {
                    console.log('跳转到下一个测验:', result.nextQuizId);
                    const groupParam = groupId ? `&groupId=${groupId}` : '';
                    window.location.href = `index.html?id=${result.nextQuizId}&mode=review${groupParam}`;
                } else if (result.completed) {
                    console.log('显示完成弹窗');
                    showReviewCompletionModal();
                } else {
                    console.log('没有下一个测验，返回复习页');
                    returnToReviewPage();
                }
            } catch (error) {
                console.error('提交评级失败:', error);
                alert('提交失败，请重试');
            }
        }

        // 显示完成弹窗
        function showReviewCompletionModal() {
            document.getElementById('review-completion-modal').style.display = 'flex';
        }

        // 返回首页
        function returnToHome() {
            window.location.href = 'home.html';
        }

        // 继续复习
        async function continueReview() {
            const params = new URLSearchParams(window.location.search);
            const groupId = params.get('groupId');
            const currentQuizId = params.get('id');
            
            try {
                const next = await ReviewAPI.getNextQuiz(groupId, currentQuizId);
                if (next && next.quizId) {
                    const groupParam = groupId ? `&groupId=${groupId}` : '';
                    window.location.href = `index.html?id=${next.quizId}&mode=review${groupParam}`;
                } else {
                    showReviewCompletionModal();
                }
            } catch (error) {
                console.error('获取下一个测验失败:', error);
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (!isReviewMode) return;
            if (document.getElementById('rating-panel').style.display !== 'block') return;
            
            switch (e.key) {
                case '1': e.preventDefault(); submitRating(1); break;
                case '2': e.preventDefault(); submitRating(2); break;
                case '3':
                case ' ': e.preventDefault(); submitRating(3); break;
                case '4': e.preventDefault(); submitRating(4); break;
            }
        });

        // 页面加载时检查复习模式
        checkReviewMode();
    </script>
</body>
</html>
