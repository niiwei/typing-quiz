<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敲脑壳 MindPop - 创建测验</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <!-- Brand Logo & Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/img/brand/logo/主logo.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/brand/favicon/apple-touch-icon.png">
</head>
<body class="create-page">
    <nav class="navbar">
        <a href="home.html" class="logo">
            <img src="assets/img/brand/logo/主logo.svg" alt="敲脑壳 MindPop" style="height: 32px; width: auto;">
        </a>
        <div class="nav-links">
            <a href="home.html">首页</a>
            <a href="quizzes.html">测验</a>
            <a href="create.html" class="active">创建</a>
            <a href="manage.html">管理</a>
            <a href="#" onclick="Auth.logout()" style="color: var(--error); margin-left: 2rem;">退出</a>
        </div>
    </nav>

    <div id="quiz-container" class="fade-in">
        <div class="manage-header">
            <h1 id="page-title" style="font-weight: 300; font-size: 1.2rem; letter-spacing: 0.1em;">创建新测验</h1>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-small" style="border-color: var(--border);" onclick="showImportModal()">导入 JSON</button>
                <button class="btn btn-small" id="save-btn" onclick="saveQuiz()">保存测验</button>
            </div>
        </div>

        <form id="quiz-form" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label">测验标题 *</label>
                <input type="text" id="quiz-title" class="form-input" placeholder="例如：世界各国首都" required>
            </div>

            <div class="form-group">
                <label class="form-label">测验描述</label>
                <textarea id="quiz-description" class="form-input" style="height: 60px;" placeholder="简要描述测ย内容..."></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <div class="form-group">
                    <label class="form-label">时间限制 (秒)</label>
                    <input type="number" id="quiz-time-limit" class="form-input" placeholder="留空为无限制" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label">所属分组</label>
                    <select id="quiz-group-select" class="form-input" style="background: transparent;">
                        <option value="">默认分组</option>
                        <!-- 动态填充 -->
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">测验类型</label>
                <div style="display: flex; gap: 2rem; margin-top: 0.5rem;">
                    <label style="font-size: 0.8rem; cursor: pointer;">
                        <input type="radio" name="quiz-type" value="TYPING" checked onchange="toggleTypeFields()"> 打字题
                    </label>
                    <label style="font-size: 0.8rem; cursor: pointer;">
                        <input type="radio" name="quiz-type" value="FILL_BLANK" onchange="toggleTypeFields()"> 填空题
                    </label>
                </div>
            </div>

            <!-- 打字题特定字段 -->
            <div id="typing-fields">
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label class="form-label" style="margin-bottom: 0;">答案列表 (每行一个)</label>
                        <button class="btn btn-small" type="button" onclick="wrapSelectionWithHash('quiz-answers')" style="padding: 0.2rem 0.5rem; font-size: 0.6rem; border-color: var(--border); color: var(--text-muted);">📝 注释选中文字 (#)</button>
                    </div>
                    <textarea id="quiz-answers" class="form-input" style="height: 200px;" placeholder="北京#首都#&#10;东京#首都#&#10;巴黎"></textarea>
                </div>
            </div>

            <!-- 填空题特定字段 -->
            <div id="fill-blank-fields" style="display: none; border-top: 1px solid var(--border); padding-top: 1.5rem; margin-top: 1.5rem;">
                <div class="form-group">
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <button class="btn btn-small" type="button" onclick="wrapSelectionWithBrackets()" style="padding: 0.2rem 0.5rem; font-size: 0.6rem; border-color: var(--border); color: var(--text-muted);">🔍 挖空选中文字 ([])</button>
                        <button class="btn btn-small" type="button" onclick="wrapSelectionWithHash('fill-blank-full-text')" style="padding: 0.2rem 0.5rem; font-size: 0.6rem; border-color: var(--border); color: var(--text-muted);">📝 注释选中文字 (#)</button>
                    </div>
                    <textarea id="fill-blank-full-text" class="form-input" style="height: 150px;" placeholder="请输入完整文本，例如：中国的首都是[北京#首都#]" oninput="updateFillPreview()"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">填空预览</label>
                    <div id="fill-blank-preview" style="padding: 1rem; background: var(--hover); font-size: 0.8rem; min-height: 3rem; color: var(--text-muted); border-radius: 4px; line-height: 1.8;">
                        预览内容将在此显示...
                    </div>
                </div>
            </div>
        </form>
    </div>


    <script src="js/api.js"></script>
    <script>
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const editQuizId = urlParams.get('id');
        let currentQuizData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }
            
            // 加载分组选项
            try {
                const groups = await fetch('/api/groups', { headers: Auth.getAuthHeaders() }).then(res => res.json());
                const select = document.getElementById('quiz-group-select');
                groups.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('加载分组失败'); }
            
            // 如果是编辑模式，加载测验数据
            if (editQuizId) {
                await loadQuizForEditing(editQuizId);
            }
        });

        // 加载测验数据用于编辑
        async function loadQuizForEditing(id) {
            try {
                const res = await fetch(`/api/quizzes/${id}`, { headers: Auth.getAuthHeaders() });
                if (!res.ok) {
                    alert('加载测验失败');
                    return;
                }
                
                const quiz = await res.json();
                currentQuizData = quiz;
                
                // 更新页面标题
                document.getElementById('page-title').textContent = '编辑测验';
                document.getElementById('save-btn').textContent = '更新测验';
                document.title = '编辑测验 - 敲脑壳 MindPop';
                
                // 填充表单数据
                document.getElementById('quiz-title').value = quiz.title || '';
                document.getElementById('quiz-description').value = quiz.description || '';
                document.getElementById('quiz-time-limit').value = quiz.timeLimit || '';
                
                // 设置测验类型
                const typeRadio = document.querySelector(`input[name="quiz-type"][value="${quiz.quizType}"]`);
                if (typeRadio) {
                    typeRadio.checked = true;
                    toggleTypeFields();
                }
                
                // 填充类型特定数据
                if (quiz.quizType === 'TYPING' && quiz.answerList) {
                    // 将答案数组转换为文本格式
                    const answersText = quiz.answerList.map(a => {
                        return a.comment ? `${a.content}#${a.comment}#` : a.content;
                    }).join('\n');
                    document.getElementById('quiz-answers').value = answersText;
                } else if (quiz.quizType === 'FILL_BLANK' && quiz.fillBlankQuiz) {
                    document.getElementById('fill-blank-full-text').value = quiz.fillBlankQuiz.fullText || '';
                    updateFillPreview();
                }
                
            } catch (e) {
                console.error('加载测验失败:', e);
                alert('加载测验失败');
            }
        }

        function toggleTypeFields() {
            const type = document.querySelector('input[name="quiz-type"]:checked').value;
            document.getElementById('typing-fields').style.display = type === 'TYPING' ? 'block' : 'none';
            document.getElementById('fill-blank-fields').style.display = type === 'FILL_BLANK' ? 'block' : 'none';
        }

        function insertCommentSymbol(id) {
            const el = document.getElementById(id);
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            el.value = text.slice(0, start) + '#' + text.slice(end);
            el.focus();
            el.setSelectionRange(start + 1, start + 1);
        }

        function wrapSelectionWithBrackets() {
            const el = document.getElementById('fill-blank-full-text');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            if (start === end) return;
            const selected = text.slice(start, end);
            el.value = text.slice(0, start) + '[' + selected + ']' + text.slice(end);
            updateFillPreview();
        }

        function wrapSelectionWithHash(elementId) {
            const el = document.getElementById(elementId);
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            if (start === end) return;
            const selected = text.slice(start, end);
            el.value = text.slice(0, start) + '#' + selected + '#' + text.slice(end);
            el.focus();
            el.setSelectionRange(end + 2, end + 2);
        }

        function updateFillPreview() {
            const text = document.getElementById('fill-blank-full-text').value;
            const preview = document.getElementById('fill-blank-preview');
            // 简单的预览正则替换
            preview.textContent = text.replace(/\[([^\]#]+)(#[^\]]+)?\]/g, '______');
        }

        // 导入功能
        function showImportModal() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = handleFileImport;
            input.click();
        }

        async function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            try {
                const text = await file.text();
                const data = JSON.parse(text);
                
                const isArray = Array.isArray(data);
                const quizzes = isArray ? data : [data];
                
                for (const quiz of quizzes) {
                    if (!quiz.title || (!quiz.answers && !quiz.answerList)) {
                        alert('文件格式不正确,请确保包含title和answers字段');
                        return;
                    }
                }
                
                const response = await fetch('/api/import-export/quizzes/import', {
                    method: 'POST',
                    headers: Auth.getAuthHeaders(),
                    body: JSON.stringify(quizzes)
                });
                
                const result = await response.json();
                
                let message = `导入完成!\n成功: ${result.successCount} 个\n失败: ${result.failureCount} 个`;
                
                if (result.failures && result.failures.length > 0) {
                    message += '\n\n失败的测验:\n';
                    result.failures.forEach(f => {
                        message += `- ${f.title}: ${f.error}\n`;
                    });
                }
                
                alert(message);
                if (result.successCount > 0) {
                    window.location.href = 'manage.html';
                }
            } catch (error) {
                console.error('导入失败:', error);
                alert('导入失败: ' + error.message);
            }
        }

        // 解析打字题答案和注释（仅 #注释# 格式才识别为注释）
        function parseTypingAnswerWithComment(line) {
            let content = line.trim();
            let comment = null;
            
            // 检查是否包含至少两个 #，且以 # 结尾
            if (content.endsWith('#')) {
                const parts = content.split('#');
                // 格式应为 "内容#注释#"，分割后至少有 3 部分 (["内容", "注释", ""])
                if (parts.length >= 3) {
                    comment = parts[parts.length - 2].trim();
                    content = parts.slice(0, parts.length - 2).join('#').trim();
                }
            }
            
            return { content: content, comment: comment };
        }

        // 解析填空题文本，生成 blanks 数组
        function parseFillBlankText(fullText) {
            const blanks = [];
            // 支持 [答案] 或 [答案#注释#] 格式（单#包裹注释）
            const regex = /\[([^\]]+)\]/g;
            let match;
            let offset = 0;
            
            while ((match = regex.exec(fullText)) !== null) {
                const fullMatch = match[0]; // 例如: [北京#首都#]
                const content = match[1];   // 例如: 北京#首都#
                const startIndex = match.index - offset;
                
                // 解析正确答案和注释（仅 #注释# 格式才识别为注释）
                let correctAnswer = content.trim();
                let comment = null;
                
                // 检查是否以 # 结尾（单#注释格式）
                if (correctAnswer.endsWith('#')) {
                    const parts = correctAnswer.split('#');
                    if (parts.length >= 3) {
                        comment = parts[parts.length - 2].trim();
                        correctAnswer = parts.slice(0, parts.length - 2).join('#').trim();
                    }
                }
                
                blanks.push({
                    startIndex: startIndex,
                    endIndex: startIndex + correctAnswer.length,
                    correctAnswer: correctAnswer,
                    comment: comment
                });
                
                // 更新偏移量（去掉标记括号后的长度变化）
                offset += fullMatch.length - correctAnswer.length;
            }
            
            return blanks;
        }

        async function saveQuiz() {
            const title = document.getElementById('quiz-title').value;
            if (!title) { alert('请输入标题'); return; }

            const type = document.querySelector('input[name="quiz-type"]:checked').value;
            const description = document.getElementById('quiz-description').value;
            const timeLimit = document.getElementById('quiz-time-limit').value;
            const groupId = document.getElementById('quiz-group-select').value;

            let quizData = {
                title,
                description,
                timeLimit: timeLimit ? parseInt(timeLimit) : null,
                quizType: type
            };

            if (type === 'TYPING') {
                const answersText = document.getElementById('quiz-answers').value;
                quizData.answerList = answersText
                    .split('\n')
                    .filter(line => line.trim())
                    .map(line => parseTypingAnswerWithComment(line));
            } else {
                const fullText = document.getElementById('fill-blank-full-text').value;
                const blanks = parseFillBlankText(fullText);
                
                if (blanks.length === 0) {
                    alert('请至少设置一个填空（使用[]标记需要填空的内容）');
                    return;
                }
                
                quizData.fillBlankQuiz = {
                    fullText: fullText,
                    blanks: blanks
                };
            }

            try {
                // 根据是否有editQuizId判断是创建还是更新
                const method = editQuizId ? 'PUT' : 'POST';
                const url = editQuizId ? `/api/quizzes/${editQuizId}` : '/api/quizzes';
                
                const response = await fetch(url, {
                    method,
                    headers: Auth.getAuthHeaders(),
                    body: JSON.stringify(quizData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    const savedQuizId = editQuizId || result.id;
                    
                    if (groupId) {
                        // 如果选了分组，关联到分组
                        await fetch(`/api/groups/${groupId}/quizzes/${savedQuizId}`, {
                            method: 'POST',
                            headers: Auth.getAuthHeaders()
                        });
                    }
                    alert(editQuizId ? '更新成功' : '保存成功');
                    window.location.href = 'manage.html';
                } else {
                    alert(editQuizId ? '更新失败' : '保存失败');
                }
            } catch (e) { 
                alert(editQuizId ? '更新失败' : '保存失败'); 
            }
        }
    </script>
</body>
</html>
