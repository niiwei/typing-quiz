<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测验列表 - Typing Quiz</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --accent: #F97316;
            --bg: #EEF2FF;
            --text: #312E81;
            --text-muted: #5c677d;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 4px 20px rgba(79, 70, 229, 0.15);
            --shadow-hover: 0 8px 40px rgba(79, 70, 229, 0.25);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
        }
        .quiz-list {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .section-title {
            color: var(--primary);
            font-size: 1.1em;
            font-weight: 600;
            margin: 40px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary-light);
            letter-spacing: 0.5px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(79, 70, 229, 0.1);
        }

        .quiz-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .quiz-card h3 {
            color: var(--text);
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .quiz-card p {
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .quiz-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.875em;
            color: var(--primary-light);
            font-weight: 500;
        }

        .group-card {
            border-left: 4px solid var(--accent);
        }

        .group-card h3 {
            color: var(--accent);
        }

        .group-quiz-count {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            margin-left: 10px;
            letter-spacing: 0.5px;
        }

        .mode-toggle {
            text-align: center;
            margin: 30px 0;
        }

        .mode-btn {
            padding: 12px 28px;
            margin: 0 8px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 999px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .mode-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            padding: 10px 20px;
            border: 2px solid rgba(79, 70, 229, 0.2);
            border-radius: 10px;
            font-size: 0.95em;
            background: white;
            cursor: pointer;
            color: var(--text);
            font-weight: 500;
            transition: all 0.2s ease;
            min-width: 140px;
        }

        .filter-bar select:hover {
            border-color: var(--primary-light);
        }

        .filter-bar select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="home.html" class="navbar-brand">🎮 Typing Quiz</a>
        <div class="navbar-nav">
            <a href="home.html" class="nav-link">首页</a>
            <a href="quizzes.html" class="nav-link active">测验列表</a>
            <a href="manage.html" class="nav-link">管理测验</a>
            <a href="database.html" class="nav-link">数据库管理</a>
        </div>
    </nav>

    <div id="quiz-container">
        <h1 style="text-align: center; margin-bottom: 10px;">选择测验</h1>

        <!-- 答题模式切换 -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="single-mode-btn" onclick="switchMode('single')">单个测验</button>
            <button class="mode-btn" id="group-mode-btn" onclick="switchMode('group')">分组测验</button>
        </div>

        <!-- 筛选器 -->
        <div class="filter-bar" id="filter-bar">
            <select id="quiz-group-filter" onchange="filterQuizzes()">
                <option value="all">全部分组</option>
            </select>
            <select id="quiz-type-filter" onchange="filterQuizzes()">
                <option value="all">全部类型</option>
                <option value="TYPING">打字题</option>
                <option value="FILL_BLANK">填空题</option>
            </select>
        </div>

        <div class="quiz-list" id="quiz-list">
            <p style="text-align: center;">加载中...</p>
        </div>
    </div>

    <script>
        let currentMode = 'single';
        let allQuizzes = [];
        let allGroups = [];

        // 获取带 token 的请求头
        function getAuthHeaders() {
            const headers = {
                'Content-Type': 'application/json'
            };
            const token = localStorage.getItem('typingquiz_token');
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            return headers;
        }

        async function loadQuizzes() {
            try {
                // 并行加载测验和分组
                const [quizzesRes, groupsRes] = await Promise.all([
                    fetch('/api/quizzes', { headers: getAuthHeaders() }),
                    fetch('/api/groups', { headers: getAuthHeaders() })
                ]);

                allQuizzes = await quizzesRes.json();
                allGroups = await groupsRes.json();

                populateGroupFilter(allGroups);

                renderQuizList();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('quiz-list').innerHTML =
                    '<p style="text-align: center; color: red;">加载失败,请刷新重试</p>';
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('single-mode-btn').classList.toggle('active', mode === 'single');
            document.getElementById('group-mode-btn').classList.toggle('active', mode === 'group');
            renderQuizList();
        }

        function populateGroupFilter(groups) {
            const groupFilter = document.getElementById('quiz-group-filter');
            groupFilter.innerHTML = '<option value="all">全部分组</option>';
            groups.forEach(group => {
                groupFilter.innerHTML += `<option value="${group.id}">${group.name}</option>`;
            });
        }

        function filterQuizzes() {
            if (currentMode !== 'single') {
                renderQuizList();
                return;
            }

            const groupFilter = document.getElementById('quiz-group-filter').value;
            const typeFilter = document.getElementById('quiz-type-filter').value;

            let filtered = allQuizzes;

            if (groupFilter !== 'all') {
                const groupId = parseInt(groupFilter, 10);
                const group = allGroups.find(g => g.id === groupId);
                if (group && group.quizIds) {
                    const quizIdSet = new Set(group.quizIds.map(id => parseInt(id, 10)));
                    filtered = filtered.filter(quiz => quizIdSet.has(quiz.id));
                } else {
                    filtered = [];
                }
            }

            if (typeFilter !== 'all') {
                filtered = filtered.filter(quiz => quiz.quizType === typeFilter);
            }

            renderSingleMode(document.getElementById('quiz-list'), filtered);
        }

        function renderQuizList() {
            const listContainer = document.getElementById('quiz-list');
            listContainer.innerHTML = '';

            if (currentMode === 'single') {
                filterQuizzes();
            } else {
                renderGroupMode(listContainer);
            }
        }

        function renderSingleMode(container, quizzesOverride = null) {
            container.innerHTML = '';
            const quizzes = quizzesOverride || allQuizzes;
            if (quizzes.length === 0) {
                container.innerHTML = '<p style="text-align: center;">暂无测验</p>';
                return;
            }

            quizzes.forEach(quiz => {
                const card = createQuizCard(quiz, false);
                container.appendChild(card);
            });
        }

        function renderGroupMode(container) {
            if (allGroups.length === 0) {
                container.innerHTML = '<p style="text-align: center;">暂无测验分组</p>';
                return;
            }

            allGroups.forEach(group => {
                const card = document.createElement('div');
                card.className = 'quiz-card group-card';
                card.onclick = () => startGroupQuiz(group.id);

                const quizCount = group.quizIds ? group.quizIds.length : 0;

                card.innerHTML = `
                    <h3>${group.name} <span class="group-quiz-count">${quizCount} 个测验</span></h3>
                    <p>${group.description || '点击开始分组测验'}</p>
                    <div class="quiz-meta">
                        <span>使用左右箭头在测验间切换</span>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function createQuizCard(quiz, isGroup = false) {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.onclick = () => {
                if (isGroup) {
                    window.location.href = `index.html?id=${quiz.id}&groupMode=true`;
                } else {
                    window.location.href = `index.html?id=${quiz.id}`;
                }
            };

            card.innerHTML = `
                <h3>${quiz.title}</h3>
                <p>${quiz.description || '暂无描述'}</p>
                <div class="quiz-meta">
                    <span>答案数: ${quiz.totalAnswers}</span>
                    <span>时间限制: ${quiz.timeLimit ? quiz.timeLimit + '秒' : '无限制'}</span>
                </div>
            `;

            return card;
        }

        function startGroupQuiz(groupId) {
            window.location.href = `index.html?groupId=${groupId}`;
        }

        document.addEventListener('DOMContentLoaded', loadQuizzes);
    </script>
</body>
</html>
