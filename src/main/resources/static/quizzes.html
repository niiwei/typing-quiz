<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测验列表 - Typing Quiz</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --accent: #F97316;
            --bg: #EEF2FF;
            --text: #312E81;
            --text-muted: #5c677d;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 4px 20px rgba(79, 70, 229, 0.15);
            --shadow-hover: 0 8px 40px rgba(79, 70, 229, 0.25);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
        }
        .quiz-list {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .section-title {
            color: var(--primary);
            font-size: 1.1em;
            font-weight: 600;
            margin: 40px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary-light);
            letter-spacing: 0.5px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(79, 70, 229, 0.1);
        }

        .quiz-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .quiz-card h3 {
            color: var(--text);
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .quiz-card p {
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .quiz-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.875em;
            color: var(--primary-light);
            font-weight: 500;
        }

        .group-card {
            border-left: 4px solid var(--accent);
        }

        .group-card h3 {
            color: var(--accent);
        }

        .group-quiz-count {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            margin-left: 10px;
            letter-spacing: 0.5px;
        }

        .group-review-badge {
            display: inline-block;
            background: var(--danger);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            margin-left: 8px;
            letter-spacing: 0.5px;
        }

        .mode-toggle {
            text-align: center;
            margin: 30px 0;
        }

        .mode-btn {
            padding: 12px 28px;
            margin: 0 8px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 999px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .mode-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            padding: 10px 20px;
            border: 2px solid rgba(79, 70, 229, 0.2);
            border-radius: 10px;
            font-size: 0.95em;
            background: white;
            cursor: pointer;
            color: var(--text);
            font-weight: 500;
            transition: all 0.2s ease;
            min-width: 140px;
        }

        .filter-bar select:hover {
            border-color: var(--primary-light);
        }

        .filter-bar select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
    <nav class="navbar">
        <a href="home.html" class="navbar-brand">Typing Quiz</a>
        <div class="navbar-nav">
            <a href="home.html" class="nav-link">首页</a>
            <a href="quizzes.html" class="nav-link active">测验</a>
            <a href="create.html" class="nav-link">创建</a>
            <a href="manage.html" class="nav-link">管理</a>
            <div id="userSection" style="display: none; margin-left: 1rem;">
                <button onclick="Auth.logout()" class="btn btn-small" style="padding: 0.2rem 0.5rem; border-color: var(--error); color: var(--error);">退出</button>
            </div>
        </div>
    </nav>

    <div id="quiz-container">
        <h1 style="font-weight: 300; letter-spacing: 0.2em; font-size: 1.2rem; margin-bottom: 2rem; text-align: center;">所有测验</h1>

        <!-- 模式切换: 单个 vs 分组 -->
        <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
            <button class="btn btn-small active-mode" id="single-mode-btn" onclick="switchMode('single')">单个测验</button>
            <button class="btn btn-small" id="group-mode-btn" onclick="switchMode('group')">分组测验</button>
        </div>

        <!-- 极简筛选器 -->
        <div class="filter-bar" id="filter-bar">
            <div class="filter-row">
                <span class="filter-label">分类</span>
                <div id="type-filters" style="display: flex; gap: 1.5rem;">
                    <span class="filter-item active" onclick="filterByType('all', this)">全部</span>
                    <span class="filter-item" onclick="filterByType('TYPING', this)">打字</span>
                    <span class="filter-item" onclick="filterByType('FILL_BLANK', this)">填空</span>
                </div>
            </div>
            <div class="filter-row" id="group-filter-row">
                <span class="filter-label">分组</span>
                <div id="group-filters" style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                    <span class="filter-item active" onclick="filterByGroup('all', this)">全部</span>
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>

        <div class="quiz-list" id="quiz-list">
            <div class="loading" style="text-align: center; padding: 2rem; font-size: 0.8rem; color: var(--text-muted);">数据加载中...</div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentMode = 'single';
        let allQuizzes = [];
        let allGroups = [];
        let activeType = 'all';
        let activeGroup = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }
            loadData();
        });

        async function loadData() {
            try {
                const [quizzesRes, groupsRes] = await Promise.all([
                    fetch('/api/quizzes', { headers: Auth.getAuthHeaders() }),
                    fetch('/api/groups', { headers: Auth.getAuthHeaders() })
                ]);

                allQuizzes = await quizzesRes.json();
                allGroups = await groupsRes.json();

                renderGroupFilters();
                renderContent();
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('quiz-list').innerHTML = '<div style="text-align: center; color: var(--error);">加载失败，请刷新重试</div>';
            }
        }

        function renderGroupFilters() {
            const container = document.getElementById('group-filters');
            allGroups.forEach(group => {
                const span = document.createElement('span');
                span.className = 'filter-item';
                span.textContent = group.name;
                span.onclick = () => filterByGroup(group.id, span);
                container.appendChild(span);
            });
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('single-mode-btn').classList.toggle('active-mode', mode === 'single');
            document.getElementById('group-mode-btn').classList.toggle('active-mode', mode === 'group');
            
            const filterBar = document.getElementById('filter-bar');
            filterBar.style.display = mode === 'single' ? 'flex' : 'none';
            
            renderContent();
        }

        function filterByType(type, el) {
            activeType = type;
            updateActiveFilter(el, 'type-filters');
            renderContent();
        }

        function filterByGroup(groupId, el) {
            activeGroup = groupId;
            updateActiveFilter(el, 'group-filters');
            renderContent();
        }

        function updateActiveFilter(el, containerId) {
            document.getElementById(containerId).querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        function renderContent() {
            const container = document.getElementById('quiz-list');
            container.innerHTML = '';

            if (currentMode === 'single') {
                let filtered = allQuizzes;
                if (activeType !== 'all') {
                    filtered = filtered.filter(q => q.quizType === activeType);
                }
                if (activeGroup !== 'all') {
                    const group = allGroups.find(g => g.id === activeGroup);
                    if (group && group.quizIds) {
                        const quizIdSet = new Set(group.quizIds.map(id => parseInt(id)));
                        filtered = filtered.filter(q => quizIdSet.has(q.id));
                    } else {
                        filtered = [];
                    }
                }
                renderSingleList(container, filtered);
            } else {
                renderGroupList(container);
            }
        }

        function renderSingleList(container, quizzes) {
            if (quizzes.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted);">暂无匹配测验</div>';
                return;
            }
            quizzes.forEach(quiz => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.onclick = () => window.location.href = `index.html?id=${quiz.id}`;
                item.innerHTML = `
                    <div class="list-info">
                        <span class="title">${quiz.title}</span>
                        <span class="sub">${quiz.totalAnswers} 项 • ${quiz.timeLimit ? quiz.timeLimit + 's' : '无限制'}</span>
                    </div>
                    <span style="font-size: 0.7rem; color: var(--text-muted);">&#8594;</span>
                `;
                container.appendChild(item);
            });
        }

        function renderGroupList(container) {
            if (allGroups.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted);">暂无测验分组</div>';
                return;
            }
            allGroups.forEach(group => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.onclick = () => window.location.href = `index.html?groupId=${group.id}`;
                item.innerHTML = `
                    <div class="list-info">
                        <span class="title">${group.name}</span>
                        <span class="sub">${group.quizIds ? group.quizIds.length : 0} 个测验 • ${group.description || '无描述'}</span>
                    </div>
                    <span style="font-size: 0.7rem; color: var(--text-muted);">&#8594;</span>
                `;
                container.appendChild(item);
            });
        }
    </script>
    <style>
        .active-mode { background: var(--accent) !important; color: var(--bg) !important; }
    </style>
</body>
</html>
