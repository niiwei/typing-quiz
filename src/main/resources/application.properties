# 服务器配置
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# MySQL 数据库配置
# 注意：生产环境请通过环境变量设置密码
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/typing_quiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:typingquiz}
spring.datasource.password=${MYSQL_PASSWORD:default_password}

# JPA 配置
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8

# 日志配置
logging.level.com.typingquiz=DEBUG
logging.level.org.springframework.web=INFO
